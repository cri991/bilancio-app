<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Resoconto Modern 2.0</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #f8fafc;
            --side: #ffffff;
            --primary: #3498db;
            --green: #2ecc71;
            --red: #e74c3c;
            --text: #334155;
        }

        body { margin: 0; display: flex; font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        
        /* SIDEBAR MINIMAL */
        .sidebar { width: 70px; background: var(--side); display: flex; flex-direction: column; align-items: center; padding-top: 20px; border-right: 1px solid #e2e8f0; }
        .nav-link { color: #94a3b8; margin: 15px 0; font-size: 20px; text-decoration: none; transition: 0.2s; }
        .nav-link.active { color: var(--primary); }

        /* CONTENT AREA */
        .main { flex-grow: 1; display: flex; flex-direction: column; padding: 20px; gap: 20px; overflow-y: auto; }

        /* TOP BAR */
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 25px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .controls { display: flex; align-items: center; gap: 20px; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* DASHBOARD GRID SIMPLIFIED */
        .dashboard-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            grid-template-rows: auto auto; 
            gap: 20px; 
        }

        .card { background: white; border-radius: 12px; padding: 20px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; min-height: 250px; }
        .full-width { grid-column: 1 / 3; }
        
        .stat-val { font-size: 40px; font-weight: 800; color: var(--green); margin: 10px 0; }
        h3 { font-size: 13px; color: #64748b; text-transform: uppercase; margin: 0 0 15px 0; letter-spacing: 0.5px; }

        canvas { max-height: 100% !important; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <a href="index.html" class="nav-link"><i class="fas fa-home"></i></a>
        <a href="#" class="nav-link active"><i class="fas fa-chart-line"></i></a>
        <a href="guadagni.html" class="nav-link"><i class="fas fa-wallet"></i></a>
    </nav>

    <div class="main">
        <div class="top-bar">
            <h2 style="margin:0; font-size: 20px;">Analisi Finanziaria</h2>
            <div class="controls">
                <button class="btn" onclick="update( -1 )"><i class="fas fa-arrow-left"></i></button>
                <span id="dateLabel" style="font-weight: 700; width: 140px; text-align: center;">MARZO 2026</span>
                <button class="btn" onclick="update( 1 )"><i class="fas fa-arrow-right"></i></button>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="card">
                <h3>Crescita vs Anno Prec.</h3>
                <div class="stat-val" id="percVal">+12.4%</div>
                <p id="subT" style="color: #94a3b8; font-size: 14px;">Rispetto a Marzo 2025</p>
            </div>

            <div class="card">
                <h3>Top 5 Entrate vs Uscite</h3>
                <canvas id="c1"></canvas>
            </div>

            <div class="card full-width">
                <h3>Andamento Flusso Mensile</h3>
                <canvas id="c2"></canvas>
            </div>
        </div>
    </div>

    <script>
        let m = 2;
        const mesi = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
        
        // Configurazione per massime prestazioni
        const fastOpt = { 
            responsive: true, 
            maintainAspectRatio: false, 
            animation: false, // Disabilita animazioni per fluidità totale
            plugins: { legend: { display: false } } 
        };

        // Grafico 1: Solo 5 barre
        const ch1 = new Chart(document.getElementById('c1'), {
            type: 'bar',
            data: { 
                labels: ['Voce 1','Voce 2','Voce 3','Voce 4','Voce 5'], 
                datasets: [
                    { data: [-20,-40,-15,-30,-10], backgroundColor: '#e74c3c', borderRadius: 5 },
                    { data: [50,80,60,90,70], backgroundColor: '#2ecc71', borderRadius: 5 }
                ] 
            },
            options: { ...fastOpt, indexAxis: 'y' }
        });

        // Grafico 2: Linee dritte (più veloci da renderizzare)
        const ch2 = new Chart(document.getElementById('c2'), {
            type: 'line',
            data: { 
                labels: [1, 5, 10, 15, 20, 25, 30], 
                datasets: [
                    { data: [30, 50, 40, 70, 60, 90, 100], borderColor: '#2ecc71', borderWidth: 3, tension: 0 },
                    { data: [10, 20, 25, 30, 45, 40, 50], borderColor: '#e74c3c', borderWidth: 3, tension: 0 }
                ] 
            },
            options: fastOpt
        });

        function update(s) {
            m = (m + s + 12) % 12;
            document.getElementById('dateLabel').innerText = mesi[m].toUpperCase() + " 2026";
            document.getElementById('subT').innerText = "Rispetto a " + mesi[m] + " 2025";
            document.getElementById('percVal').innerText = "+" + (Math.random() * 20).toFixed(1) + "%";

            // Aggiornamento dati randomico ultra-veloce
            [ch1, ch2].forEach(c => {
                c.data.datasets.forEach(d => d.data = d.data.map(v => v + (Math.random()*10 - 5)));
                c.update();
            });
        }
    </script>
</body>
</html>
