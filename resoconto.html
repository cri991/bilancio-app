<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Resoconto - Bilancio App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f4f7fa; --white: #ffffff; --primary: #3b82f6; --green: #10b981; --red: #ef4444; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); display: flex; height: 100vh; }
        
        .sidebar { width: 90px; background: var(--white); border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; align-items: center; padding: 25px 0; flex-shrink: 0; }
        .nav-link { color: #cbd5e0; font-size: 24px; margin: 18px 0; text-decoration: none; }
        .nav-link.active { color: var(--primary); }

        .main { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .stat-card { background: white; padding: 30px; border-radius: 18px; border: 1px solid #e2e8f0; text-align: center; }
        .label { color: #64748b; font-size: 14px; text-transform: uppercase; font-weight: 600; }
        .value { font-size: 44px; font-weight: 800; display: block; margin: 15px 0; }
        .badge { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <a href="#" class="nav-link"><i class="fas fa-th-large"></i></a>
        <a href="index.html" class="nav-link"><i class="fas fa-home"></i></a>
        <a href="calendario.html" class="nav-link"><i class="fas fa-calendar-alt"></i></a>
        <a href="resoconto.html" class="nav-link active"><i class="fas fa-chart-line"></i></a>
        <a href="guadagni.html" class="nav-link"><i class="fas fa-wallet"></i></a>
    </nav>

    <div class="main">
        <div class="header">
            <h2 style="margin:0">Analisi Performance Mensile</h2>
            <div style="font-weight:bold; background: white; padding: 10px 20px; border-radius: 10px; border: 1px solid #e2e8f0;">MARZO 2026</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="label">Entrate Medie</span>
                <span class="value" style="color: var(--green);">€ 142,50</span>
                <span class="badge" style="background:#dcfce7; color:#166534;">+4.8% vs Febbraio</span>
            </div>
            <div class="stat-card">
                <span class="label">Spese Medie</span>
                <span class="value" style="color: var(--red);">€ 101,20</span>
                <span class="badge" style="background:#fee2e2; color:#991b1b;">-1.2% vs Febbraio</span>
            </div>
            <div class="stat-card">
                <span class="label">Efficienza Risparmio</span>
                <span class="value" style="color: var(--primary);">29.4%</span>
                <span class="badge" style="background:#e0f2fe; color:#0369a1;">Stabile</span>
            </div>
        </div>
    </div>
</body>
</html>
