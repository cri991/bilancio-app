<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilancio App - Resoconto</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #14181b;
            --card-bg: #1e252b;
            --text-main: #f8f9fa;
            --primary-green: #2ecc71;
            --primary-red: #e74c3c;
            --accent-blue: #3498db;
            --sidebar-width: 80px;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden; /* Blocca lo scroll della pagina */
        }

        body { display: flex; }

        /* SIDEBAR */
        .sidebar {
            width: var(--sidebar-width);
            background-color: #0b0d0f;
            display: flex; flex-direction: column; align-items: center; padding: 20px 0;
            flex-shrink: 0;
        }
        .nav-link { color: #5d6d7e; font-size: 24px; margin: 20px 0; text-decoration: none; transition: 0.3s; }
        .nav-link.active { color: var(--primary-green); }

        /* GRID LAYOUT FLUIDO */
        .dashboard-container {
            flex-grow: 1;
            display: grid;
            grid-template-columns: 300px 1fr 1fr;
            grid-template-rows: 60px 1fr 1fr;
            gap: 10px;
            padding: 10px;
            box-sizing: border-box;
        }

        .header-bar { grid-column: 1 / 4; display: flex; justify-content: space-between; align-items: center; padding: 0 10px; }

        .chart-container {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            display: flex; flex-direction: column;
            position: relative;
            min-height: 0; /* Importante per Chart.js */
        }

        /* WIDGET STATISTICA */
        .stat-sidebar { grid-row: 2 / 4; justify-content: center; align-items: center; text-align: center; }
        .perc-val { font-size: 56px; font-weight: bold; color: var(--primary-green); margin: 15px 0; }
        .nav-btns { display: flex; gap: 15px; margin-top: 20px; }
        .btn { background: #34495e; border: none; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .btn:hover { background: var(--accent-blue); }

        /* GRAFICI */
        .top-mirror { grid-column: 2 / 4; }
        .chart-wrapper { flex-grow: 1; position: relative; width: 100%; height: 100%; }
        h3 { margin: 0 0 10px 0; font-size: 14px; color: #95a5a6; text-transform: uppercase; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <a href="index.html" class="nav-link"><i class="fas fa-home"></i></a>
        <a href="calendario.html" class="nav-link"><i class="fas fa-calendar-alt"></i></a>
        <a href="#" class="nav-link active"><i class="fas fa-chart-line"></i></a>
        <a href="guadagni.html" class="nav-link"><i class="fas fa-wallet"></i></a>
    </nav>

    <div class="dashboard-container">
        <div class="header-bar">
            <h2 id="title-date">RESOCONTO MARZO 2026</h2>
            <div style="color: var(--accent-blue)">Modalità Desktop Attiva</div>
        </div>

        <div class="chart-container stat-sidebar">
            <h3>Confronto Mensile</h3>
            <div class="perc-val" id="perc-display">+17%</div>
            <p id="comp-text">vs. Marzo 2025</p>
            <div class="nav-btns">
                <button class="btn" onclick="updateData(-1)"><i class="fas fa-chevron-left"></i></button>
                <button class="btn" onclick="updateData(1)"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>

        <div class="chart-container top-mirror">
            <h3>Ultime 10 Transazioni: Spese (Sinistra) vs Guadagni (Destra)</h3>
            <div class="chart-wrapper">
                <canvas id="mirrorChart"></canvas>
            </div>
        </div>

        <div class="chart-container">
            <h3>Flusso di Cassa Mensile</h3>
            <div class="chart-wrapper">
                <canvas id="flowChart"></canvas>
            </div>
        </div>

        <div class="chart-container">
            <h3>Andamento Annuale (Mese x Mese)</h3>
            <div class="chart-wrapper">
                <canvas id="barChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // Configurazione globale Chart.js per Dark Mode
        Chart.defaults.color = '#95a5a6';
        Chart.defaults.borderColor = 'rgba(255,255,255,0.05)';

        let monthIdx = 2; // Marzo
        const mesi = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];

        // 1. GRAFICO SPECCHIO
        const mirrorCtx = document.getElementById('mirrorChart').getContext('2d');
        const mirrorChart = new Chart(mirrorCtx, {
            type: 'bar',
            data: {
                labels: ['Stipendio', 'Freelance', 'Vendita', 'Bonus', 'Affitto', 'Luce', 'Spesa', 'Auto', 'Palestra', 'Internet'],
                datasets: [
                    { label: 'Uscite', data: [-400, -120, -80, -200, -600, -50, -90, -150, -40, -30], backgroundColor: '#e74c3c' },
                    { label: 'Entrate', data: [2200, 450, 100, 300, 0, 0, 0, 0, 0, 0], backgroundColor: '#2ecc71' }
                ]
            },
            options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });

        // 2. GRAFICO FLUSSO
        const flowCtx = document.getElementById('flowChart').getContext('2d');
        const flowChart = new Chart(flowCtx, {
            type: 'line',
            data: {
                labels: Array.from({length: 30}, (_, i) => i + 1),
                datasets: [
                    { label: 'Guadagni', data: [10, 30, 20, 50, 80, 70, 90, 100, 110], borderColor: '#2ecc71', fill: true, backgroundColor: 'rgba(46, 204, 113, 0.1)', tension: 0.4 },
                    { label: 'Spese', data: [5, 20, 40, 30, 25, 60, 40, 50, 30], borderColor: '#e74c3c', fill: true, backgroundColor: 'rgba(231, 76, 60, 0.1)', tension: 0.4 }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        // 3. GRAFICO BARRE
        const barCtx = document.getElementById('barChart').getContext('2d');
        const barChart = new Chart(barCtx, {
            type: 'bar',
            data: {
                labels: ['Gen', 'Feb', 'Mar', 'Apr', 'Mag', 'Giu'],
                datasets: [
                    { label: 'Entrate', data: [2000, 2200, 2500, 2100, 2400, 2300], backgroundColor: '#2ecc71' },
                    { label: 'Uscite', data: [1800, 1500, 1900, 1600, 1700, 2000], backgroundColor: '#e74c3c' }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        function updateData(step) {
            monthIdx += step;
            if(monthIdx > 11) monthIdx = 0;
            if(monthIdx < 0) monthIdx = 11;

            const meseCorrente = mesi[monthIdx];
            document.getElementById('title-date').innerText = `RESOCONTO ${meseCorrente.toUpperCase()} 2026`;
            document.getElementById('comp-text').innerText = `vs. ${meseCorrente} 2025`;
            
            // Simula variazione dati casuali
            const newVal = (Math.random() * 40).toFixed(1);
            document.getElementById('perc-display').innerText = `+${newVal}%`;
            
            // Aggiorna grafici con dati random per mostrare il movimento
            [mirrorChart, flowChart, barChart].forEach(chart => {
                chart.data.datasets.forEach(ds => {
                    ds.data = ds.data.map(v => v + (Math.random() * 10 - 5));
                });
                chart.update();
            });
        }
    </script>
</body>
</html>
