<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MyFinance Pro - Dashboard Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-user-select: none; touch-action: manipulation; }
        #app-container { display: flex; height: 100vh; width: 100%; overflow: hidden; }
        
        @media (max-width: 1024px) {
            aside { position: fixed; top: 0; left: -100%; width: 85% !important; height: 100vh; z-index: 999; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
            aside.mobile-open { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.2); }
            #mobile-menu-trigger { display: flex !important; }
        }

        .sidebar-link.active { background: #4f46e5 !important; color: white !important; box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.4); }
        .content-section { display: none; }
        .content-section.active { display: block !important; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .work-day.has-hours { border-bottom: 4px solid #10b981; background: #f0fdf4; }
        .note-day.has-note::after { content: ''; display: block; width: 5px; height: 5px; background: #f43f5e; border-radius: 50%; margin: 2px auto 0; }
        .day-box.selected { border: 2px solid #4f46e5; background: #eef2ff; }
        
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center text-slate-800">

    <button id="mobile-menu-trigger" onclick="toggleMobileSidebar()" class="fixed bottom-6 right-6 w-16 h-16 bg-indigo-600 text-white rounded-full hidden items-center justify-center z-[1000] shadow-2xl active:scale-95 transition-transform">
        <i class="fas fa-bars text-xl"></i>
    </button>

    <div id="app-container">
        <aside id="sidebar" class="w-72 bg-white border-r border-slate-200 flex flex-col p-8 justify-between shrink-0">
            <div class="space-y-10">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg"><i class="fas fa-gem"></i></div>
                    <span class="font-black text-2xl tracking-tighter uppercase italic">MyFinance</span>
                </div>
                <nav class="space-y-1.5 text-slate-500 font-bold text-sm">
                    <button onclick="showSection('home')" id="btn-home" class="sidebar-link active w-full flex items-center space-x-4 p-4 rounded-2xl transition-all"><i class="fas fa-chart-pie w-5"></i> <span>Dashboard</span></button>
                    <button onclick="showSection('lavoro')" id="btn-lavoro" class="sidebar-link w-full flex items-center space-x-4 p-4 rounded-2xl transition-all"><i class="fas fa-business-time w-5"></i> <span>Turni Lavoro</span></button>
                    <button onclick="showSection('spese')" id="btn-spese" class="sidebar-link w-full flex items-center space-x-4 p-4 rounded-2xl transition-all"><i class="fas fa-wallet w-5"></i> <span>Spese Fisse</span></button>
                    <button onclick="showSection('variabili')" id="btn-variabili" class="sidebar-link w-full flex items-center space-x-4 p-4 rounded-2xl transition-all"><i class="fas fa-shopping-bag w-5"></i> <span>Variabili</span></button>
                    <button onclick="showSection('calendario')" id="btn-calendario" class="sidebar-link w-full flex items-center space-x-4 p-4 rounded-2xl transition-all"><i class="fas fa-sticky-note w-5"></i> <span>Note & Memo</span></button>
                </nav>
            </div>
            <div class="pt-6 border-t border-slate-100 space-y-2">
                <button onclick="exportData()" class="w-full text-left p-3 text-[10px] font-black uppercase text-indigo-500 hover:bg-indigo-50 rounded-xl"><i class="fas fa-cloud-download-alt mr-2"></i> Esporta Backup</button>
                <button onclick="resetApp()" class="w-full text-left p-3 text-[10px] font-black uppercase text-rose-400 hover:bg-rose-50 rounded-xl"><i class="fas fa-trash-alt mr-2"></i> Reset</button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-6 md:p-12">
            
            <div id="home" class="content-section active space-y-8">
                <h2 class="text-4xl font-black tracking-tighter uppercase italic">Dashboard</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-slate-900 p-8 rounded-[2.5rem] text-white shadow-xl">
                        <p class="text-[10px] font-black uppercase opacity-40 tracking-widest mb-2 text-indigo-400">Totale <span id="year-label"></span></p>
                        <h3 id="h-guadagno-anno" class="text-5xl font-black italic tracking-tighter">€ 0,00</h3>
                        <p id="h-ore-anno" class="mt-2 text-indigo-300 font-bold text-xs uppercase">0 ore totali</p>
                    </div>
                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm border-l-8 border-l-indigo-600">
                        <p class="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-2">Entrate Mese</p>
                        <h3 id="h-guadagno-mese" class="text-4xl font-black text-slate-800">€ 0,00</h3>
                        <p id="h-ore-mese" class="mt-1 text-indigo-500 font-bold text-xs uppercase">0 ore lavorate</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-[2rem] border border-slate-200 flex items-center space-x-4 border-l-8 border-l-rose-500">
                        <div class="w-12 h-12 bg-rose-50 rounded-full flex items-center justify-center text-rose-500 text-xl"><i class="fas fa-file-invoice-dollar"></i></div>
                        <div>
                            <p class="text-[10px] font-black uppercase text-slate-400">Spese Fisse</p>
                            <h4 id="dash-fisse" class="text-2xl font-black text-slate-800">€ 0,00</h4>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-[2rem] border border-slate-200 flex items-center space-x-4 border-l-8 border-l-amber-500">
                        <div class="w-12 h-12 bg-amber-50 rounded-full flex items-center justify-center text-amber-500 text-xl"><i class="fas fa-shopping-cart"></i></div>
                        <div>
                            <p class="text-[10px] font-black uppercase text-slate-400">Variabili</p>
                            <h4 id="dash-variabili" class="text-2xl font-black text-slate-800">€ 0,00</h4>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="bg-white p-8 rounded-[3rem] border border-slate-200 flex flex-col items-center">
                        <h4 class="text-[10px] font-black uppercase text-slate-400 mb-6">Bilancio Mese</h4>
                        <div class="w-full max-w-[240px] h-[240px]"><canvas id="chartBilancio"></canvas></div>
                    </div>
                    
                    <div class="bg-slate-800 p-8 rounded-[3rem] text-white">
                        <h4 class="text-[10px] font-black uppercase text-indigo-400 mb-6 tracking-widest"><i class="fas fa-bell mr-2"></i>Memo Recenti</h4>
                        <div id="dash-notes-list" class="space-y-3 custom-scroll overflow-y-auto max-h-[220px] pr-2">
                            </div>
                    </div>

                    <div class="bg-white p-8 rounded-[3rem] border border-slate-200">
                        <h4 class="text-[10px] font-black uppercase text-slate-400 mb-6 tracking-widest">Archivio Anni</h4>
                        <div id="storico-list" class="space-y-2 custom-scroll overflow-y-auto max-h-[220px]"></div>
                    </div>
                </div>
            </div>

            <div id="lavoro" class="content-section space-y-8">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
                    <h2 class="text-4xl font-black tracking-tighter uppercase italic">Registro Turni</h2>
                    <div class="bg-white p-4 rounded-2xl border border-indigo-100 flex items-center space-x-4">
                        <span class="text-[10px] font-black text-slate-400 uppercase">Paga Oraria €</span>
                        <input type="number" id="paga-oraria" onchange="updatePaga()" value="10" class="w-16 font-black text-indigo-600 outline-none text-right">
                    </div>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2 bg-white p-8 rounded-[3rem] border border-slate-200 shadow-sm">
                        <div class="flex justify-between items-center mb-8">
                            <button onclick="changeWorkMonth(-1)" class="w-10 h-10 hover:bg-slate-100 rounded-full"><i class="fas fa-chevron-left"></i></button>
                            <span id="workMonthTitle" class="font-black uppercase tracking-widest text-xs"></span>
                            <button onclick="changeWorkMonth(1)" class="w-10 h-10 hover:bg-slate-100 rounded-full"><i class="fas fa-chevron-right"></i></button>
                        </div>
                        <div id="work-grid" class="grid grid-cols-7 gap-3"></div>
                    </div>
                    <div class="bg-slate-900 p-8 rounded-[3rem] text-white h-fit shadow-2xl">
                        <h4 id="selectedWorkDay" class="text-xl font-black mb-8 italic text-indigo-400 text-center uppercase tracking-tighter">Scegli Data</h4>
                        <div class="space-y-6">
                            <input type="time" id="time-start" class="w-full bg-white/10 p-4 rounded-2xl font-black text-2xl outline-none border border-white/5">
                            <input type="time" id="time-end" class="w-full bg-white/10 p-4 rounded-2xl font-black text-2xl outline-none border border-white/5">
                            <button onclick="saveShift()" class="w-full bg-indigo-600 p-5 rounded-2xl font-black uppercase text-[10px] tracking-widest">Salva Turno</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="calendario" class="content-section space-y-8">
                <h2 class="text-4xl font-black tracking-tighter uppercase italic text-slate-800">Note & Memo</h2>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2 bg-white p-8 rounded-[3rem] border border-slate-200 shadow-sm">
                        <div class="flex justify-between items-center mb-8">
                            <button onclick="changeNoteMonth(-1)" class="w-12 h-12 hover:bg-slate-100 rounded-full transition-colors"><i class="fas fa-chevron-left"></i></button>
                            <span id="noteMonthTitle" class="font-black uppercase tracking-[0.2em] text-xs"></span>
                            <button onclick="changeNoteMonth(1)" class="w-12 h-12 hover:bg-slate-100 rounded-full transition-colors"><i class="fas fa-chevron-right"></i></button>
                        </div>
                        <div id="note-grid" class="grid grid-cols-7 gap-3"></div>
                    </div>
                    <div class="bg-white p-8 rounded-[3rem] border border-slate-200 shadow-xl h-fit">
                        <h4 id="selectedNoteDay" class="text-xl font-black mb-6 italic text-indigo-600 border-b pb-4">Seleziona Giorno</h4>
                        <textarea id="memoText" placeholder="Scrivi una nota..." class="w-full p-4 bg-slate-50 rounded-2xl mb-4 font-bold outline-none h-32"></textarea>
                        <button onclick="addMemo()" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black uppercase text-[10px] tracking-widest">Salva Nota</button>
                        <div id="memoList" class="mt-6 space-y-3"></div>
                    </div>
                </div>
            </div>

            <div id="spese" class="content-section space-y-6">
                <h2 class="text-4xl font-black tracking-tighter uppercase italic">Spese Fisse</h2>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-200 h-fit">
                        <input type="text" id="fissa-nome" placeholder="Nome Spesa" class="w-full p-4 bg-slate-50 rounded-xl mb-4 font-bold outline-none">
                        <input type="number" id="fissa-prezzo" placeholder="Prezzo €" class="w-full p-4 bg-slate-50 rounded-xl mb-6 font-black outline-none">
                        <button onclick="addItem('fissa')" class="w-full bg-slate-900 text-white p-4 rounded-xl font-black uppercase text-xs">Aggiungi</button>
                    </div>
                    <div id="lista-fisse" class="space-y-2"></div>
                </div>
            </div>

            <div id="variabili" class="content-section space-y-6">
                <h2 class="text-4xl font-black tracking-tighter uppercase italic">Variabili</h2>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-200 h-fit">
                        <input type="text" id="var-nome" placeholder="Nome Spesa" class="w-full p-4 bg-slate-50 rounded-xl mb-4 font-bold outline-none">
                        <input type="number" id="var-prezzo" placeholder="Prezzo €" class="w-full p-4 bg-slate-50 rounded-xl mb-6 font-black outline-none">
                        <button onclick="addItem('variabile')" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-black uppercase text-xs">Aggiungi</button>
                    </div>
                    <div id="lista-variabili" class="space-y-2"></div>
                </div>
            </div>

        </main>
    </div>

    <script>
        // DATA SETUP
        let workData = JSON.parse(localStorage.getItem('myFinWork')) || {}; 
        let notes = JSON.parse(localStorage.getItem('myFinNotes')) || {};
        let fisse = JSON.parse(localStorage.getItem('myFinFisse')) || [];
        let variabili = JSON.parse(localStorage.getItem('myFinVariabili')) || [];
        let pagaOraria = localStorage.getItem('myFinPaga') || 10;
        
        let workViewDate = new Date();
        let noteViewDate = new Date();
        let selectedWorkKey = null;
        let selectedNoteKey = null;
        let chartBilancio = null;

        function toggleMobileSidebar() { document.getElementById('sidebar').classList.toggle('mobile-open'); }

        function showSection(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
            if(id === 'home') renderResoconto();
            if(id === 'lavoro') renderWork();
            if(id === 'calendario') renderNotesCalendar();
            if(id === 'spese' || id === 'variabili') renderItems();
            if(window.innerWidth < 1024) document.getElementById('sidebar').classList.remove('mobile-open');
        }

        // --- RESOCONTO DASHBOARD ---
        function renderResoconto() {
            const now = new Date();
            const curM = now.getMonth();
            const curY = now.getFullYear();
            document.getElementById('year-label').innerText = curY;

            let oreMese = 0, annualTotals = {};
            for(let k in workData) {
                const [d, m, y] = k.split('-').map(Number);
                const h = parseFloat(workData[k].hours);
                if(!annualTotals[y]) annualTotals[y] = 0;
                annualTotals[y] += h;
                if(y === curY && m === curM) oreMese += h;
            }

            const guadagnoMese = oreMese * pagaOraria;
            const guadagnoAnno = (annualTotals[curY] || 0) * pagaOraria;

            // Spese
            let tF = 0; fisse.forEach(s => tF += parseFloat(s.prezzo));
            let tV = 0; variabili.forEach(s => tV += parseFloat(s.prezzo));

            // UI Dashboard
            document.getElementById('h-guadagno-mese').innerText = `€ ${guadagnoMese.toLocaleString('it-IT', {minimumFractionDigits:2})}`;
            document.getElementById('h-guadagno-anno').innerText = `€ ${guadagnoAnno.toLocaleString('it-IT', {minimumFractionDigits:2})}`;
            document.getElementById('h-ore-mese').innerText = `${oreMese.toFixed(1)} ore questo mese`;
            document.getElementById('h-ore-anno').innerText = `${(annualTotals[curY] || 0).toFixed(1)} ore totali`;
            document.getElementById('dash-fisse').innerText = `€ ${tF.toLocaleString()}`;
            document.getElementById('dash-variabili').innerText = `€ ${tV.toLocaleString()}`;

            // Storico
            const sl = document.getElementById('storico-list'); sl.innerHTML = '';
            Object.keys(annualTotals).sort((a,b)=>b-a).forEach(y => {
                sl.innerHTML += `<div class="flex justify-between p-3 bg-slate-50 rounded-xl border text-[11px]"><b>${y}</b> <span class="text-indigo-600 font-black">€ ${(annualTotals[y]*pagaOraria).toLocaleString()}</span></div>`;
            });

            // Note Dashboard
            renderDashNotes();
            updateChart(guadagnoMese, tF, tV);
        }

        function renderDashNotes() {
            const list = document.getElementById('dash-notes-list');
            list.innerHTML = '';
            const allKeys = Object.keys(notes).sort((a,b) => {
                const [d1,m1,y1] = a.split('-').map(Number);
                const [d2,m2,y2] = b.split('-').map(Number);
                return new Date(y1,m1,d1) - new Date(y2,m2,d2);
            });
            
            const futureNotes = allKeys.filter(k => {
                const [d,m,y] = k.split('-').map(Number);
                const dObj = new Date(y,m,d);
                const today = new Date(); today.setHours(0,0,0,0);
                return dObj >= today;
            });

            if(futureNotes.length === 0) {
                list.innerHTML = '<p class="text-[10px] opacity-30 italic">Nessun memo futuro...</p>';
                return;
            }

            futureNotes.slice(0, 5).forEach(k => {
                notes[k].forEach(n => {
                    const [d,m,y] = k.split('-');
                    list.innerHTML += `<div class="bg-white/5 border border-white/10 p-3 rounded-xl">
                        <p class="text-[9px] font-black text-indigo-400 uppercase mb-1">${d}/${parseInt(m)+1}</p>
                        <p class="text-xs font-medium text-slate-300">${n}</p>
                    </div>`;
                });
            });
        }

        function updateChart(entrata, fisseVal, varVal) {
            const ctx = document.getElementById('chartBilancio').getContext('2d');
            if(chartBilancio) chartBilancio.destroy();
            chartBilancio = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Entrate', 'Fisse', 'Variabili'],
                    datasets: [{
                        data: [entrata, fisseVal, varVal],
                        backgroundColor: ['#4f46e5', '#f43f5e', '#f59e0b'],
                        borderWidth: 0
                    }]
                },
                options: { cutout: '80%', plugins: { legend: { display: false } } }
            });
        }

        // --- LOGICA NOTE ---
        function renderNotesCalendar() {
            const grid = document.getElementById('note-grid'); const y = noteViewDate.getFullYear(); const m = noteViewDate.getMonth();
            document.getElementById('noteMonthTitle').innerText = new Intl.DateTimeFormat('it-IT', {month:'long', year:'numeric'}).format(noteViewDate);
            grid.innerHTML = ''; const first = new Date(y, m, 1).getDay() || 7; const last = new Date(y, m+1, 0).getDate();
            for(let i=1; i<first; i++) grid.innerHTML += '<div></div>';
            for(let d=1; d<=last; d++) {
                const k = `${d}-${m}-${y}`; const hasN = notes[k] ? 'has-note' : '';
                const isSel = selectedNoteKey === k ? 'selected' : '';
                grid.innerHTML += `<div onclick="selectNoteDay(${d},${m},${y})" class="day-box ${hasN} ${isSel} p-4 rounded-xl border text-center cursor-pointer hover:bg-indigo-50 font-black text-xs text-slate-400">${d}</div>`;
            }
            renderNotesList();
        }
        function selectNoteDay(d, m, y) { selectedNoteKey = `${d}-${m}-${y}`; document.getElementById('selectedNoteDay').innerText = `${d}/${m+1}/${y}`; renderNotesCalendar(); }
        function addMemo() { 
            const txt = document.getElementById('memoText').value; 
            if(!selectedNoteKey || !txt) return;
            if(!notes[selectedNoteKey]) notes[selectedNoteKey] = [];
            notes[selectedNoteKey].push(txt);
            document.getElementById('memoText').value = '';
            localStorage.setItem('myFinNotes', JSON.stringify(notes));
            renderNotesCalendar();
            renderResoconto();
        }
        function renderNotesList() {
            const l = document.getElementById('memoList'); l.innerHTML = '';
            if(selectedNoteKey && notes[selectedNoteKey]) {
                notes[selectedNoteKey].forEach((n, i) => {
                    l.innerHTML += `<div class="bg-slate-50 p-4 rounded-xl flex justify-between items-start border mb-2 text-sm">
                        <p class="font-bold text-slate-600">${n}</p>
                        <button onclick="delNote(${i})" class="text-rose-400 ml-2"><i class="fas fa-trash"></i></button>
                    </div>`;
                });
            }
        }
        function delNote(i) { notes[selectedNoteKey].splice(i, 1); if(notes[selectedNoteKey].length === 0) delete notes[selectedNoteKey]; localStorage.setItem('myFinNotes', JSON.stringify(notes)); renderNotesCalendar(); renderResoconto(); }
        function changeNoteMonth(s) { noteViewDate.setMonth(noteViewDate.getMonth()+s); renderNotesCalendar(); }

        // --- LOGICA TURNI ---
        function renderWork() {
            const grid = document.getElementById('work-grid'); const y = workViewDate.getFullYear(); const m = workViewDate.getMonth();
            document.getElementById('workMonthTitle').innerText = new Intl.DateTimeFormat('it-IT', {month:'long', year:'numeric'}).format(workViewDate);
            grid.innerHTML = ''; const first = new Date(y, m, 1).getDay() || 7; const last = new Date(y, m+1, 0).getDate();
            for(let i=1; i<first; i++) grid.innerHTML += '<div></div>';
            for(let d=1; d<=last; d++) {
                const k = `${d}-${m}-${y}`; const data = workData[k];
                grid.innerHTML += `<div onclick="selectWorkDay(${d},${m},${y})" class="work-day ${data?'has-hours':''} ${selectedWorkKey===k?'selected':''} p-4 rounded-xl border text-center cursor-pointer h-20 flex flex-col justify-center">
                    <span class="text-[10px] font-black text-slate-300 uppercase">${d}</span>
                    <span class="text-xs font-black ${data?'text-indigo-600':'text-transparent'}">${data ? data.hours+'h' : '0h'}</span>
                </div>`;
            }
        }
        function selectWorkDay(d, m, y) { selectedWorkKey = `${d}-${m}-${y}`; const data = workData[selectedWorkKey]; document.getElementById('selectedWorkDay').innerText = `${d}/${m+1}/${y}`; document.getElementById('time-start').value = data ? data.start : ""; document.getElementById('time-end').value = data ? data.end : ""; renderWork(); }
        function saveShift() { if(!selectedWorkKey) return; const start = document.getElementById('time-start').value; const end = document.getElementById('time-end').value; if(start && end) { const s = start.split(':'); const e = end.split(':'); let diff = (new Date(0,0,0,e[0],e[1]) - new Date(0,0,0,s[0],s[1])) / 1000 / 60 / 60; if (diff < 0) diff += 24; workData[selectedWorkKey] = { start, end, hours: diff.toFixed(2) }; } else { delete workData[selectedWorkKey]; } localStorage.setItem('myFinWork', JSON.stringify(workData)); renderWork(); renderResoconto(); }
        function changeWorkMonth(s) { workViewDate.setMonth(workViewDate.getMonth()+s); renderWork(); }
        function updatePaga() { pagaOraria = document.getElementById('paga-oraria').value; localStorage.setItem('myFinPaga', pagaOraria); renderResoconto(); }

        // --- GESTIONE SPESE ---
        function addItem(type) {
            const n = document.getElementById(type==='fissa'?'fissa-nome':'var-nome').value;
            const p = document.getElementById(type==='fissa'?'fissa-prezzo':'var-prezzo').value;
            if(n && p) {
                if(type==='fissa') fisse.push({nome:n, prezzo:p}); else variabili.push({nome:n, prezzo:p});
                document.getElementById(type==='fissa'?'fissa-nome':'var-nome').value = '';
                document.getElementById(type==='fissa'?'fissa-prezzo':'var-prezzo').value = '';
                renderItems(); renderResoconto();
            }
        }
        function delItem(type, i) { if(type==='fissa') fisse.splice(i, 1); else variabili.splice(i, 1); renderItems(); renderResoconto(); }
        function renderItems() {
            const lf = document.getElementById('lista-fisse'); lf.innerHTML = '';
            fisse.forEach((s, i) => { lf.innerHTML += `<div class="bg-white p-4 rounded-xl flex justify-between items-center border mb-2"><span>${s.nome}</span><button onclick="delItem('fissa', ${i})" class="font-black text-rose-500">€ ${parseFloat(s.prezzo).toLocaleString()} <i class="fas fa-times-circle ml-1"></i></button></div>`; });
            const lv = document.getElementById('lista-variabili'); lv.innerHTML = '';
            variabili.forEach((s, i) => { lv.innerHTML += `<div class="bg-white p-4 rounded-xl flex justify-between items-center border mb-2"><span>${s.nome}</span><button onclick="delItem('variabile', ${i})" class="font-black text-amber-500">€ ${parseFloat(s.prezzo).toLocaleString()} <i class="fas fa-times-circle ml-1"></i></button></div>`; });
            localStorage.setItem('myFinFisse', JSON.stringify(fisse)); localStorage.setItem('myFinVariabili', JSON.stringify(variabili));
        }

        // --- EXPORT & RESET ---
        function exportData() { const blob = new Blob([JSON.stringify({workData, notes, fisse, variabili, pagaOraria})], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'MyFinance_Backup.json'; a.click(); }
        function resetApp() { if(confirm("Cancellare tutto?")) { localStorage.clear(); location.reload(); } }

        // INIT
        document.getElementById('paga-oraria').value = pagaOraria;
        renderResoconto(); renderItems();
    </script>
</body>
</html>
