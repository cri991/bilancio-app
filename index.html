<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilancio App - Dashboard Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f4f7f6;
            --sidebar-color: #ffffff;
            --primary-blue: #3498db;
            --income-green: #2ecc71;
            --expense-red: #e74c3c;
            --text-dark: #2c3e50;
            --shadow: 0 4px 15px rgba(0,0,0,0.05);
            --sidebar-width: 80px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-dark);
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            z-index: 100;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-grow: 1;
        }

        .sidebar-item-link {
            text-decoration: none;
            margin: 15px 0;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .sidebar-item-link:hover {
            background-color: #f0f4f8;
            transform: translateY(-2px);
        }

        .sidebar-item-link.active {
            background-color: #e1f0fa;
        }

        .sidebar-icon { font-size: 26px; }
        .icon-home { color: var(--primary-blue); } 
        .icon-cal { color: #34495e; }    
        .icon-stats { color: #2ecc71; }  
        .icon-wallet { color: #f1c40f; } 

        /* --- MAIN CONTENT --- */
        .main-content {
            flex-grow: 1;
            display: grid;
            grid-template-columns: 350px 1fr;
            grid-template-rows: 1fr auto;
            gap: 20px;
            padding: 25px;
            overflow-y: auto;
        }

        .card { background: #fff; border-radius: 15px; padding: 20px; box-shadow: var(--shadow); }

        .financial-summary { display: flex; flex-direction: column; gap: 15px; }
        .stat-box h2 { margin: 0; font-size: 14px; color: #7f8c8d; }
        .stat-box p { margin: 5px 0; font-size: 28px; font-weight: bold; }
        .income { color: var(--income-green); }
        .expense { color: var(--expense-red); }
        .net { color: var(--text-dark); border-top: 1px solid #eee; padding-top: 10px; margin-top: 10px; }

        .calendar-container { grid-column: 2; grid-row: 1 / 3; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day { border: 1px solid #f0f0f0; border-radius: 8px; min-height: 80px; padding: 5px; background: #fff; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-menu">
            <a href="index.html" class="sidebar-item-link active" title="Home">
                <i class="fas fa-home sidebar-icon icon-home"></i>
            </a>
            
            <a href="calendario.html" class="sidebar-item-link" title="Calendario">
                <i class="fas fa-calendar-alt sidebar-icon icon-cal"></i>
            </a>
            
            <a href="resoconto.html" class="sidebar-item-link" title="Resoconto">
                <i class="fas fa-chart-bar sidebar-icon icon-stats"></i>
            </a>
            
            <a href="guadagni.html" class="sidebar-item-link" title="Guadagni e Spese">
                <i class="fas fa-wallet sidebar-icon icon-wallet"></i>
            </a>
        </div>
    </nav>

    <main class="main-content">
        <section class="financial-summary">
            <div class="card stat-box">
                <h2>Guadagni Totali (Marzo)</h2>
                <p class="income">€ 4.250,00</p>
                <h2>Spese Totali (Marzo)</h2>
                <p class="expense">€ 3.110,00</p>
                <div class="net">
                    <h2>Bilancio Attuale</h2>
                    <p>€ 1.140,00</p>
                </div>
            </div>

            <div class="card">
                <h3>Variazione Rispetto a Febbraio</h3>
                <p style="color: var(--income-green); font-weight: bold;">+12.5% ↑</p>
            </div>
        </section>

        <section class="card calendar-container">
            <div class="calendar-header">
                <h2>Prossime Scadenze</h2>
                <a href="calendario.html" style="text-decoration:none; color:var(--primary-blue);">Vai al Calendario &rarr;</a>
            </div>
            <div class="calendar-grid">
                <div class="day">1</div><div class="day">2</div><div class="day">3</div><div class="day">4</div>
                <div class="day" style="background: #fff5f5; border-color: #feb2b2;">5 <br><small>Affitto</small></div>
                <div class="day">6</div><div class="day">7</div>
            </div>
        </section>
    </main>

</body>
</html>
