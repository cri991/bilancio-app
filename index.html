<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyFinance Desktop Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-user-select: none; }
        .sidebar-link.active { background: #4f46e5 !important; color: white !important; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4); }
        .content-section { display: none; }
        .content-section.active { display: block !important; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .work-day.selected, .note-day.selected { border: 3px solid #4f46e5 !important; background: #eef2ff; }
        .work-day.has-hours { border-bottom: 4px solid #10b981; }
        .note-day.has-note::after { content: ''; display: block; width: 5px; height: 5px; background: #f43f5e; border-radius: 50%; margin: 2px auto 0; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden text-slate-900">

    <aside class="w-72 bg-white border-r border-slate-200 flex flex-col p-8 justify-between">
        <div class="space-y-10">
            <div class="flex items-center space-x-3">
                <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-lg"><i class="fas fa-vault fa-lg"></i></div>
                <span class="font-black text-2xl tracking-tighter uppercase italic">MyFinance</span>
            </div>
            <nav class="space-y-2">
                <button onclick="showSection('home')" id="btn-home" class="sidebar-link active w-full flex items-center space-x-4 p-4 rounded-2xl font-bold text-sm text-slate-500 hover:bg-slate-50"><i class="fas fa-home w-5"></i> <span>Dashboard Home</span></button>
                <button onclick="showSection('lavoro')" id="btn-lavoro" class="sidebar-link w-full flex items-center space-x-4 p-4 rounded-2xl font-bold text-sm text-slate-500 hover:bg-slate-50"><i class="fas fa-clock w-5"></i> <span>Ore Lavorative</span></button>
                <button onclick="showSection('spese')" id="btn-spese" class="sidebar-link w-full flex items-center space-x-4 p-4 rounded-2xl font-bold text-sm text-slate-500 hover:bg-slate-50"><i class="fas fa-receipt w-5"></i> <span>Spese Fisse</span></button>
                <button onclick="showSection('variabili')" id="btn-variabili" class="sidebar-link w-full flex items-center space-x-4 p-4 rounded-2xl font-bold text-sm text-slate-500 hover:bg-slate-50"><i class="fas fa-shopping-cart w-5"></i> <span>Spese Variabili</span></button>
                <button onclick="showSection('calendario')" id="btn-calendario" class="sidebar-link w-full flex items-center space-x-4 p-4 rounded-2xl font-bold text-sm text-slate-500 hover:bg-slate-50"><i class="fas fa-calendar-alt w-5"></i> <span>Calendario / Note</span></button>
            </nav>
        </div>
        <div class="pt-6 border-t border-slate-100 italic">
            <button onclick="resetApp()" class="w-full text-left p-3 text-[10px] font-black uppercase text-rose-400 hover:bg-rose-50 rounded-xl tracking-widest"><i class="fas fa-power-off mr-2"></i> Reset Dati</button>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-12 bg-slate-50">
        
        <div id="home" class="content-section active space-y-10">
            <h2 class="text-4xl font-black tracking-tighter uppercase">Dashboard</h2>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 text-slate-800">
                <div class="bg-white p-10 rounded-[3rem] shadow-sm border border-slate-100"><span class="text-[10px] font-black text-slate-300 uppercase">Guadagno Anno</span><h3 id="h-guadagno-anno" class="text-5xl font-black mt-2 tracking-tighter text-indigo-600">€ 0,00</h3></div>
                <div class="bg-white p-8 rounded-[2.5rem] border-l-8 border-rose-500 shadow-sm"><p class="text-xs font-bold uppercase text-rose-500">Uscite Fisse</p><h4 id="h-fisse-home" class="text-3xl font-black mt-1">€ 0,00</h4></div>
                <div class="bg-white p-8 rounded-[2.5rem] border-l-8 border-orange-500 shadow-sm"><p class="text-xs font-bold uppercase text-orange-500">Uscite Variabili</p><h4 id="h-var-home" class="text-3xl font-black mt-1">€ 0,00</h4></div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                <div class="bg-white p-8 rounded-[3.5rem] shadow-sm border border-slate-100 flex flex-col items-center">
                    <h4 class="text-[10px] font-black uppercase text-slate-400 mb-6 italic">Analisi Mensile</h4>
                    <div class="w-56 h-56"><canvas id="chartBilancio"></canvas></div>
                </div>
                <div class="bg-slate-900 p-10 rounded-[3.5rem] shadow-2xl text-white overflow-hidden relative">
                    <h4 class="text-[10px] font-black uppercase opacity-40 mb-6 tracking-[0.2em]">Note Recenti & Future</h4>
                    <div id="home-notes-list" class="space-y-4 max-h-[250px] overflow-y-auto pr-2">
                        </div>
                    <div class="absolute bottom-0 left-0 w-full h-12 bg-gradient-to-t from-slate-900 to-transparent pointer-events-none"></div>
                </div>
            </div>
        </div>

        <div id="lavoro" class="content-section space-y-10">
            <div class="flex justify-between items-end">
                <h2 class="text-4xl font-black tracking-tighter uppercase">Ore Lavorative</h2>
                <div class="bg-white p-4 rounded-3xl border shadow-sm flex items-center space-x-4">
                    <span class="text-[10px] font-black text-slate-400">PAGA ORARIA €</span>
                    <input type="number" id="paga-oraria" onchange="renderWork()" value="10" class="w-20 p-2 rounded-xl bg-slate-50 font-black text-center text-indigo-600 outline-none">
                </div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 bg-white p-8 rounded-[3rem] border">
                    <div class="flex justify-between items-center mb-8">
                        <button onclick="changeWorkMonth(-1)" class="w-10 h-10 rounded-xl hover:bg-slate-50"><i class="fas fa-chevron-left"></i></button>
                        <span id="workMonthTitle" class="font-black text-lg uppercase tracking-widest"></span>
                        <button onclick="changeWorkMonth(1)" class="w-10 h-10 rounded-xl hover:bg-slate-50"><i class="fas fa-chevron-right"></i></button>
                    </div>
                    <div id="work-grid" class="grid grid-cols-7 gap-3"></div>
                </div>
                <div class="bg-slate-900 p-8 rounded-[2.5rem] text-white shadow-xl h-fit">
                    <h4 id="selectedWorkDay" class="text-xl font-black mb-6 italic">Seleziona Giorno</h4>
                    <input type="number" step="0.5" id="work-hours-input" placeholder="0" class="w-full p-4 rounded-2xl bg-white/10 text-white font-black text-3xl mb-4 outline-none">
                    <button onclick="saveHours()" class="w-full bg-indigo-500 p-4 rounded-2xl font-black uppercase text-[10px] tracking-widest">Salva Ore</button>
                </div>
            </div>
        </div>

        <div id="calendario" class="content-section space-y-10">
            <div class="flex justify-between items-center">
                <h2 class="text-4xl font-black tracking-tighter uppercase">Calendario / Note</h2>
                <div class="flex bg-white p-2 rounded-2xl border shadow-sm space-x-4 items-center">
                    <button onclick="changeNoteMonth(-1)" class="w-10 h-10 rounded-xl hover:bg-slate-50 text-slate-400"><i class="fas fa-chevron-left"></i></button>
                    <span id="noteMonthTitle" class="font-black text-sm uppercase tracking-widest w-44 text-center"></span>
                    <button onclick="changeNoteMonth(1)" class="w-10 h-10 rounded-xl hover:bg-slate-50 text-slate-400"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                <div class="bg-white p-8 rounded-[3rem] border shadow-sm"><div id="note-grid" class="grid grid-cols-7 gap-4"></div></div>
                <div class="space-y-6">
                    <div id="selectedNoteLabel" class="text-[10px] font-black text-indigo-500 uppercase tracking-widest bg-indigo-50 px-4 py-1 rounded-full w-fit">Seleziona data</div>
                    <div class="bg-white p-8 rounded-[3rem] shadow-xl border border-indigo-50">
                        <input type="text" id="memoText" placeholder="Scrivi una nota..." class="w-full p-4 rounded-2xl bg-slate-50 border-none font-bold mb-4 outline-none">
                        <button onclick="addMemo()" class="w-full bg-slate-900 text-white font-black p-4 rounded-2xl uppercase text-[10px]">Salva Nota</button>
                        <div id="memoList" class="mt-6 space-y-3"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="spese" class="content-section space-y-10">
            <h2 class="text-4xl font-black tracking-tighter uppercase">Spese Fisse</h2>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                <div class="bg-white p-8 rounded-[3rem] border h-fit">
                    <input type="text" id="fissa-nome" placeholder="Nome" class="w-full p-4 bg-slate-50 mb-4 font-bold rounded-xl outline-none">
                    <input type="number" id="fissa-prezzo" placeholder="€" class="w-full p-4 bg-slate-50 mb-4 font-black rounded-xl outline-none">
                    <button onclick="addItem('fissa')" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black uppercase text-xs italic">Aggiungi</button>
                </div>
                <div class="lg:col-span-2 bg-white p-8 rounded-[3rem] border">
                    <div id="lista-fisse" class="divide-y"></div>
                    <div class="mt-8 text-right font-black text-3xl text-indigo-600 italic" id="tot-fisse">€ 0,00</div>
                </div>
            </div>
        </div>

        <div id="variabili" class="content-section space-y-10">
            <h2 class="text-4xl font-black tracking-tighter uppercase">Spese Variabili</h2>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                <div class="bg-white p-8 rounded-[3rem] border h-fit">
                    <input type="text" id="var-nome" placeholder="Nome" class="w-full p-4 bg-slate-50 mb-4 font-bold rounded-xl outline-none">
                    <input type="number" id="var-prezzo" placeholder="€" class="w-full p-4 bg-slate-50 mb-4 font-black rounded-xl outline-none">
                    <button onclick="addItem('variabile')" class="w-full bg-indigo-600 text-white p-5 rounded-2xl font-black uppercase text-xs italic">Aggiungi</button>
                </div>
                <div class="lg:col-span-2 bg-white p-8 rounded-[3rem] border">
                    <div id="lista-variabili" class="divide-y"></div>
                    <div class="mt-8 text-right font-black text-3xl text-emerald-500 italic" id="tot-variabili">€ 0,00</div>
                </div>
            </div>
        </div>

    </main>

    <script>
        // DATABASE & STATE
        let fisse = JSON.parse(localStorage.getItem('myFinFisse')) || [];
        let variabili = JSON.parse(localStorage.getItem('myFinVariabili')) || [];
        let workData = JSON.parse(localStorage.getItem('myFinWork')) || {};
        let notes = JSON.parse(localStorage.getItem('myFinNotes')) || {};
        let pagaOraria = localStorage.getItem('myFinPaga') || 10;

        let workViewDate = new Date();
        let noteViewDate = new Date();
        let selectedWorkKey = null;
        let selectedNoteKey = null;
        let chartBilancio = null;

        function showSection(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
            if(id === 'home') { renderHomeNotes(); updateCharts(); }
            if(id === 'lavoro') renderWork();
            if(id === 'calendario') renderNotesCalendar();
            render();
        }

        // --- GRAFICI ---
        function updateCharts() {
            const ctx = document.getElementById('chartBilancio').getContext('2d');
            const y = workViewDate.getFullYear(); const m = workViewDate.getMonth();
            let oreM = 0; for(let d=1; d<=31; d++) { if(workData[`${d}-${m}-${y}`]) oreM += parseFloat(workData[`${d}-${m}-${y}`]); }
            const gM = oreM * pagaOraria;
            let tF = 0; fisse.forEach(s => tF += parseFloat(s.prezzo));
            let tV = 0; variabili.forEach(s => tV += parseFloat(s.prezzo));
            const tU = tF + tV;

            if(chartBilancio) chartBilancio.destroy();
            chartBilancio = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: ['Entrate', 'Uscite'], datasets: [{ data: [gM, tU], backgroundColor: ['#4f46e5', '#f43f5e'], borderWidth: 0 }] },
                options: { plugins: { legend: { display: false } }, cutout: '80%' }
            });
        }

        // --- NOTE IN HOME (NUOVA FUNZIONE) ---
        function renderHomeNotes() {
            const container = document.getElementById('home-notes-list');
            container.innerHTML = '';
            const allKeys = Object.keys(notes).sort(); // Ordina per data (approssimativo)
            
            if(allKeys.length === 0) {
                container.innerHTML = '<p class="text-slate-500 italic text-xs">Nessuna nota presente...</p>';
                return;
            }

            allKeys.forEach(key => {
                notes[key].forEach(note => {
                    const [d, m, y] = key.split('-');
                    container.innerHTML += `
                        <div class="bg-white/5 border border-white/10 p-4 rounded-2xl flex items-center justify-between group">
                            <div>
                                <span class="text-[9px] font-black text-indigo-400 block uppercase mb-1">${d}/${parseInt(m)+1}/${y}</span>
                                <p class="text-sm font-bold text-slate-200">${note}</p>
                            </div>
                            <i class="fas fa-bookmark text-slate-700 group-hover:text-indigo-500 transition-colors"></i>
                        </div>`;
                });
            });
        }

        // --- CALENDARIO NOTE (SISTEMATO) ---
        function renderNotesCalendar() {
            const grid = document.getElementById('note-grid');
            const y = noteViewDate.getFullYear(); const m = noteViewDate.getMonth();
            document.getElementById('noteMonthTitle').innerText = new Intl.DateTimeFormat('it-IT', { month: 'long', year: 'numeric' }).format(noteViewDate);
            grid.innerHTML = '';
            const first = new Date(y, m, 1).getDay() || 7;
            const last = new Date(y, m + 1, 0).getDate();
            for(let i = 1; i < first; i++) grid.innerHTML += `<div></div>`;
            for(let d = 1; d <= last; d++) {
                const key = `${d}-${m}-${y}`;
                const hasN = notes[key] && notes[key].length > 0 ? 'has-note' : '';
                grid.innerHTML += `<div onclick="selectNoteDay(${d},${m},${y})" class="note-day ${hasN} ${selectedNoteKey === key ? 'selected' : ''} p-4 rounded-2xl bg-slate-50 text-slate-400 text-center cursor-pointer font-black text-[10px] hover:bg-indigo-50">${d}</div>`;
            }
            renderNotesList();
        }
        function changeNoteMonth(s) { noteViewDate.setMonth(noteViewDate.getMonth() + s); renderNotesCalendar(); }
        function selectNoteDay(d, m, y) { selectedNoteKey = `${d}-${m}-${y}`; document.getElementById('selectedNoteLabel').innerText = `${d}/${parseInt(m)+1}/${y}`; renderNotesCalendar(); }
        function addMemo() { const t = document.getElementById('memoText').value; if(t && selectedNoteKey) { if(!notes[selectedNoteKey]) notes[selectedNoteKey] = []; notes[selectedNoteKey].push(t); document.getElementById('memoText').value=''; localStorage.setItem('myFinNotes', JSON.stringify(notes)); renderNotesCalendar(); } }
        function renderNotesList() { const l = document.getElementById('memoList'); l.innerHTML=''; if(selectedNoteKey && notes[selectedNoteKey]) { notes[selectedNoteKey].forEach((n, i) => { l.innerHTML += `<div class="bg-white p-3 border rounded-xl text-[10px] font-bold uppercase flex justify-between"><span>${n}</span><button onclick="delNote(${i})" class="text-rose-500"><i class="fas fa-trash"></i></button></div>`; }); } }
        function delNote(i) { notes[selectedNoteKey].splice(i,1); if(notes[selectedNoteKey].length === 0) delete notes[selectedNoteKey]; localStorage.setItem('myFinNotes', JSON.stringify(notes)); renderNotesCalendar(); }

        // --- RESTO DELLE FUNZIONI (LAVORO & SPESE) ---
        function renderWork() {
            const grid = document.getElementById('work-grid'); const y = workViewDate.getFullYear(); const m = workViewDate.getMonth();
            pagaOraria = document.getElementById('paga-oraria').value; localStorage.setItem('myFinPaga', pagaOraria);
            document.getElementById('workMonthTitle').innerText = new Intl.DateTimeFormat('it-IT', { month: 'long', year: 'numeric' }).format(workViewDate);
            grid.innerHTML = '';
            const first = new Date(y, m, 1).getDay() || 7; const last = new Date(y, m + 1, 0).getDate();
            for(let i = 1; i < first; i++) grid.innerHTML += `<div></div>`;
            for(let d = 1; d <= last; d++) {
                const key = `${d}-${m}-${y}`; const ore = workData[key] || 0;
                grid.innerHTML += `<div onclick="selectWorkDay(${d},${m},${y})" class="work-day ${ore > 0 ? 'has-hours' : ''} ${selectedWorkKey === key ? 'selected' : ''} p-4 rounded-2xl bg-white border text-center cursor-pointer hover:shadow-md"><span class="text-[10px] block font-black text-slate-300">${d}</span><span class="text-xs font-bold ${ore > 0 ? 'text-indigo-600' : 'text-slate-200'}">${ore > 0 ? ore + 'h' : '-'}</span></div>`;
            }
            calculateYearly();
        }
        function changeWorkMonth(s) { workViewDate.setMonth(workViewDate.getMonth() + s); renderWork(); }
        function selectWorkDay(d, m, y) { selectedWorkKey = `${d}-${m}-${y}`; document.getElementById('selectedWorkDay').innerText = `${d}/${parseInt(m)+1}/${y}`; document.getElementById('work-hours-input').value = workData[selectedWorkKey] || ''; renderWork(); }
        function saveHours() { if(!selectedWorkKey) return; const h = document.getElementById('work-hours-input').value; if(h > 0) workData[selectedWorkKey] = h; else delete workData[selectedWorkKey]; localStorage.setItem('myFinWork', JSON.stringify(workData)); renderWork(); }

        function addItem(tipo) { const n = document.getElementById(tipo === 'fissa' ? 'fissa-nome' : 'var-nome').value; const p = document.getElementById(tipo === 'fissa' ? 'fissa-prezzo' : 'var-prezzo').value; if(n && p) { if(tipo === 'fissa') fisse.push({nome: n, prezzo: p}); else variabili.push({nome: n, prezzo: p}); render(); } }
        function delItem(tipo, i) { if(tipo === 'fissa') fisse.splice(i, 1); else variabili.splice(i, 1); render(); }

        function render() {
            let tF = 0; let tV = 0;
            fisse.forEach(s => tF += parseFloat(s.prezzo)); variabili.forEach(s => tV += parseFloat(s.prezzo));
            document.getElementById('tot-fisse').innerText = `€ ${tF.toLocaleString()}`;
            document.getElementById('tot-variabili').innerText = `€ ${tV.toLocaleString()}`;
            document.getElementById('h-fisse-home').innerText = `€ ${tF.toLocaleString()}`;
            document.getElementById('h-var-home').innerText = `€ ${tV.toLocaleString()}`;
            
            const fl = document.getElementById('lista-fisse'); fl.innerHTML = ''; fisse.forEach((s,i) => fl.innerHTML += `<div class="flex justify-between py-4"><span>${s.nome}</span><button onclick="delItem('fissa',${i})">€ ${s.prezzo} <i class="fas fa-times ml-2 text-rose-300"></i></button></div>`);
            const vl = document.getElementById('lista-variabili'); vl.innerHTML = ''; variabili.forEach((s,i) => vl.innerHTML += `<div class="flex justify-between py-4"><span>${s.nome}</span><button onclick="delItem('variabile',${i})">€ ${s.prezzo} <i class="fas fa-times ml-2 text-rose-300"></i></button></div>`);

            localStorage.setItem('myFinFisse', JSON.stringify(fisse));
            localStorage.setItem('myFinVariabili', JSON.stringify(variabili));
            calculateYearly();
        }

        function calculateYearly() {
            const curY = new Date().getFullYear(); let totO = 0;
            for (let k in workData) { if (k.endsWith(`-${curY}`)) totO += parseFloat(workData[k]); }
            document.getElementById('h-guadagno-anno').innerText = `€ ${(totO * pagaOraria).toLocaleString()}`;
        }

        function resetApp() { if(confirm("Cancellare tutto?")) { localStorage.clear(); location.reload(); } }
        
        // INIT
        document.getElementById('paga-oraria').value = pagaOraria;
        render();
        renderHomeNotes();
        updateCharts();
    </script>
</body>
</html>
