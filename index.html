<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyFinance Desktop Pro - Executive Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-user-select: none; }
        .sidebar-link.active { background: #4f46e5; color: white; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4); }
        .content-section { display: none; }
        .content-section.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .calendar-day.has-note::after { content: ''; display: block; width: 4px; height: 4px; background: #4f46e5; border-radius: 50%; margin: 2px auto 0; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden text-slate-900">

    <aside class="w-72 bg-white border-r border-slate-200 flex flex-col p-8 justify-between">
        <div class="space-y-10">
            <div class="flex items-center space-x-3">
                <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-lg">
                    <i class="fas fa-vault fa-lg"></i>
                </div>
                <span class="font-black text-2xl tracking-tighter uppercase italic">MyFinance</span>
            </div>

            <nav class="space-y-2">
                <button onclick="showSection('home')" id="btn-home" class="sidebar-link active w-full flex items-center space-x-4 p-4 rounded-2xl transition-all font-bold text-sm">
                    <i class="fas fa-home w-5"></i> <span>Dashboard Home</span>
                </button>
                <button onclick="showSection('strategica')" id="btn-strategica" class="sidebar-link w-full flex items-center space-x-4 p-4 rounded-2xl transition-all font-bold text-sm text-slate-500 hover:bg-slate-50">
                    <i class="fas fa-brain w-5"></i> <span>Analisi Strategica</span>
                </button>
                <button onclick="showSection('calendario')" id="btn-calendario" class="sidebar-link w-full flex items-center space-x-4 p-4 rounded-2xl transition-all font-bold text-sm text-slate-500 hover:bg-slate-50">
                    <i class="fas fa-calendar-alt w-5"></i> <span>Calendario / Note</span>
                </button>
                <button onclick="showSection('movimenti')" id="btn-movimenti" class="sidebar-link w-full flex items-center space-x-4 p-4 rounded-2xl transition-all font-bold text-sm text-slate-500 hover:bg-slate-50">
                    <i class="fas fa-exchange-alt w-5"></i> <span>Movimenti</span>
                </button>
            </nav>
        </div>

        <div class="space-y-3 pt-6 border-t border-slate-100">
            <button onclick="exportData()" class="w-full text-left p-3 text-xs font-bold text-indigo-600 hover:bg-indigo-50 rounded-xl transition-all"><i class="fas fa-download mr-2"></i> Esporta Database</button>
            <label class="w-full text-left p-3 text-xs font-bold text-emerald-600 hover:bg-emerald-50 rounded-xl transition-all cursor-pointer block">
                <i class="fas fa-upload mr-2"></i> Importa Backup
                <input type="file" id="importFile" class="hidden" onchange="importData(event)">
            </label>
            <button onclick="resetApp()" class="w-full text-left p-3 text-xs font-bold text-rose-400 hover:bg-rose-50 rounded-xl transition-all"><i class="fas fa-power-off mr-2"></i> Reset App</button>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-12">
        
        <div id="home" class="content-section active space-y-10">
            <h2 class="text-4xl font-black tracking-tighter uppercase">Stato Reale</h2>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="bg-white p-10 rounded-[3rem] shadow-sm border border-slate-100">
                    <span class="text-[10px] font-black text-slate-300 uppercase">Saldo Attuale</span>
                    <h3 id="h-totale" class="text-5xl font-black text-slate-900 mt-2 tracking-tighter">€ 0,00</h3>
                </div>
                <div class="bg-white p-8 rounded-[2.5rem] border-l-8 border-emerald-500 shadow-sm"><p class="text-xs font-bold uppercase text-emerald-500">Entrate</p><h4 id="h-entrate" class="text-3xl font-black mt-1">€ 0,00</h4></div>
                <div class="bg-white p-8 rounded-[2.5rem] border-l-8 border-rose-500 shadow-sm"><p class="text-xs font-bold uppercase text-rose-500">Uscite</p><h4 id="h-uscite" class="text-3xl font-black mt-1">€ 0,00</h4></div>
            </div>
        </div>

        <div id="strategica" class="content-section space-y-10">
            <h2 class="text-4xl font-black tracking-tighter uppercase text-indigo-600">Analisi Strategica</h2>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="bg-slate-900 p-10 rounded-[3rem] text-white shadow-2xl"><span class="opacity-50 text-[10px] font-bold uppercase">Previste IN</span><h3 id="s-entrate" class="text-4xl font-black mt-2 text-emerald-400">€ 0,00</h3></div>
                <div class="bg-white p-10 rounded-[3rem] border border-slate-100 shadow-lg"><span class="text-slate-300 text-[10px] font-bold uppercase">Pendenti OUT</span><h3 id="s-uscite" class="text-4xl font-black mt-2 text-rose-500">€ 0,00</h3></div>
                <div id="s-card-netto" class="p-10 rounded-[3rem] text-white shadow-xl"><span class="opacity-80 text-[10px] font-bold uppercase">Saldo Futuro</span><h3 id="s-netto" class="text-4xl font-black mt-2 tracking-tighter">€ 0,00</h3></div>
            </div>
        </div>

        <div id="calendario" class="content-section space-y-10">
            <h2 class="text-4xl font-black tracking-tighter uppercase">Calendario & Promemoria</h2>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                <div class="bg-white p-8 rounded-[3rem] shadow-sm border border-slate-100">
                    <div class="flex justify-between items-center mb-6 px-4">
                        <h3 id="monthTitle" class="font-black text-xl uppercase tracking-tighter"></h3>
                    </div>
                    <div class="grid grid-cols-7 gap-2 text-center text-[10px] font-black text-slate-300 uppercase mb-4">
                        <div>Lun</div><div>Mar</div><div>Mer</div><div>Gio</div><div>Ven</div><div>Sab</div><div>Dom</div>
                    </div>
                    <div id="calendar-grid" class="grid grid-cols-7 gap-3"></div>
                </div>
                <div class="space-y-6">
                    <div class="bg-indigo-50 p-8 rounded-[3rem]">
                        <h4 class="text-xs font-black uppercase text-indigo-400 mb-4 tracking-widest">Nuovo Promemoria</h4>
                        <input type="text" id="memoText" placeholder="Cosa ricordare?" class="w-full p-4 rounded-2xl bg-white border-none focus:ring-2 focus:ring-indigo-500 font-bold mb-4">
                        <div class="flex items-center space-x-3 mb-6">
                            <span class="text-[10px] font-black text-slate-400 uppercase">Colore:</span>
                            <div class="flex space-x-2">
                                <button onclick="selectColor('bg-rose-500')" class="w-6 h-6 rounded-full bg-rose-500 border-2 border-white ring-2 ring-transparent hover:ring-rose-200"></button>
                                <button onclick="selectColor('bg-emerald-500')" class="w-6 h-6 rounded-full bg-emerald-500 border-2 border-white ring-2 ring-transparent hover:ring-emerald-200"></button>
                                <button onclick="selectColor('bg-indigo-600')" class="w-6 h-6 rounded-full bg-indigo-600 border-2 border-white ring-2 ring-transparent hover:ring-indigo-200"></button>
                                <button onclick="selectColor('bg-slate-800')" class="w-6 h-6 rounded-full bg-slate-800 border-2 border-white ring-2 ring-transparent hover:ring-slate-200"></button>
                            </div>
                        </div>
                        <button onclick="addMemo()" class="w-full bg-indigo-600 text-white font-black p-4 rounded-2xl uppercase text-xs tracking-widest shadow-lg shadow-indigo-200 hover:bg-slate-900 transition-all">Salva Nota</button>
                    </div>
                    <div id="memoList" class="space-y-3 h-[250px] overflow-y-auto pr-2"></div>
                </div>
            </div>
        </div>

        <div id="movimenti" class="content-section space-y-8">
            <div class="bg-white p-10 rounded-[3rem] shadow-sm border border-slate-100">
                <form id="f-mov" class="grid grid-cols-1 md:grid-cols-4 gap-6 items-end">
                    <div><label class="text-[10px] font-black text-slate-400 ml-2 uppercase">Cosa</label><input type="text" id="m-desc" class="w-full p-4 rounded-2xl bg-slate-50 border-none font-bold" required></div>
                    <div><label class="text-[10px] font-black text-slate-400 ml-2 uppercase">Quanto €</label><input type="number" step="0.01" id="m-val" class="w-full p-4 rounded-2xl bg-slate-50 border-none font-black text-lg" required></div>
                    <div class="grid grid-cols-2 gap-2">
                        <div><label class="text-[10px] font-black text-slate-400 ml-1 uppercase">Tipo</label><select id="m-tipo" class="w-full p-4 rounded-2xl bg-slate-50 border-none font-bold text-xs uppercase"><option value="entrata">IN</option><option value="uscita">OUT</option></select></div>
                        <div><label class="text-[10px] font-black text-slate-400 ml-1 uppercase">Stato</label><select id="m-stato" class="w-full p-4 rounded-2xl bg-slate-50 border-none font-bold text-xs uppercase text-indigo-600"><option value="saldato">Saldato</option><option value="pendente">Pendente</option></select></div>
                    </div>
                    <button type="submit" class="bg-indigo-600 text-white font-black p-5 rounded-2xl uppercase text-xs tracking-widest shadow-lg hover:bg-slate-900 transition-all">Registra</button>
                </form>
            </div>
            <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50/50 uppercase text-[10px] font-black text-slate-400">
                        <tr><th class="p-6">Stato</th><th class="p-6">Descrizione</th><th class="p-6 text-right">Importo</th><th class="p-6"></th></tr>
                    </thead>
                    <tbody id="m-tbody" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </div>

    </main>

    <script>
        let db = JSON.parse(localStorage.getItem('myFinanceDB')) || [];
        let notes = JSON.parse(localStorage.getItem('myFinanceNotes')) || [];
        let activeColor = 'bg-indigo-600';

        function showSection(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
            if(id === 'calendario') initCalendar();
            render();
        }

        function render() {
            // Dashboard Home & Strategica
            let rh = { e: 0, u: 0 }, st = { e: 0, u: 0 };
            const tbody = document.getElementById('m-tbody');
            tbody.innerHTML = '';

            db.forEach((m, i) => {
                const v = parseFloat(m.valore);
                if (m.stato === 'saldato') { if (m.tipo === 'entrata') rh.e += v; else rh.u += v; } 
                else { if (m.tipo === 'entrata') st.e += v; else st.u += v; }

                tbody.innerHTML += `
                    <tr class="group hover:bg-slate-50 transition-all cursor-pointer">
                        <td class="p-6" onclick="toggleStato(${i})"><span class="px-3 py-1 rounded-full text-[9px] font-black ${m.stato === 'saldato' ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600 animate-pulse'} uppercase">${m.stato}</span></td>
                        <td class="p-6 font-bold text-xs uppercase tracking-tight">${m.desc}</td>
                        <td class="p-6 text-right font-black ${m.tipo === 'entrata' ? 'text-emerald-500' : 'text-rose-500'} text-lg italic">€ ${v.toLocaleString('it-IT')}</td>
                        <td class="p-6 text-right"><button onclick="elimina(${i})" class="text-slate-200 hover:text-rose-500"><i class="fas fa-trash"></i></button></td>
                    </tr>`;
            });

            document.getElementById('h-totale').innerText = `€ ${(rh.e - rh.u).toLocaleString('it-IT')}`;
            document.getElementById('h-entrate').innerText = `€ ${rh.e.toLocaleString('it-IT')}`;
            document.getElementById('h-uscite').innerText = `€ ${rh.u.toLocaleString('it-IT')}`;
            document.getElementById('s-entrate').innerText = `€ ${st.e.toLocaleString('it-IT')}`;
            document.getElementById('s-uscite').innerText = `€ ${st.u.toLocaleString('it-IT')}`;
            const sN = st.e - st.u;
            document.getElementById('s-netto').innerText = `€ ${Math.abs(sN).toLocaleString('it-IT')}`;
            document.getElementById('s-card-netto').className = `p-10 rounded-[3rem] shadow-xl text-white transition-all ${sN >= 0 ? 'bg-indigo-600' : 'bg-amber-500'}`;

            // Note
            const nList = document.getElementById('memoList');
            nList.innerHTML = '';
            notes.forEach((n, i) => {
                nList.innerHTML += `<div class="${n.color} p-4 rounded-2xl text-white text-xs font-bold flex justify-between shadow-lg"><span>${n.text}</span><button onclick="delNote(${i})"><i class="fas fa-times opacity-50"></i></button></div>`;
            });

            localStorage.setItem('myFinanceDB', JSON.stringify(db));
            localStorage.setItem('myFinanceNotes', JSON.stringify(notes));
        }

        // CALENDARIO LOGIC
        function initCalendar() {
            const grid = document.getElementById('calendar-grid');
            const now = new Date();
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            document.getElementById('monthTitle').innerText = now.toLocaleDateString('it-IT', { month: 'long', year: 'numeric' });
            grid.innerHTML = '';
            for(let i = 1; i <= daysInMonth; i++) {
                const isToday = i === now.getDate() ? 'ring-2 ring-indigo-500 ring-offset-2' : '';
                grid.innerHTML += `<div class="p-4 rounded-xl text-[10px] font-black bg-slate-50 text-slate-400 text-center ${isToday}">${i}</div>`;
            }
        }

        // AZIONI
        document.getElementById('f-mov').onsubmit = (e) => {
            e.preventDefault();
            db.unshift({ desc: document.getElementById('m-desc').value, valore: document.getElementById('m-val').value, tipo: document.getElementById('m-tipo').value, stato: document.getElementById('m-stato').value });
            e.target.reset(); render();
        };

        function addMemo() {
            const txt = document.getElementById('memoText').value;
            if(!txt) return;
            notes.unshift({ text: txt, color: activeColor });
            document.getElementById('memoText').value = ''; render();
        }

        function selectColor(c) { activeColor = c; }
        function toggleStato(i) { db[i].stato = db[i].stato === 'saldato' ? 'pendente' : 'saldato'; render(); }
        function elimina(i) { if(confirm("Eliminare movimento?")) { db.splice(i,1); render(); } }
        function delNote(i) { notes.splice(i,1); render(); }
        function resetApp() { if(confirm("Cancellare tutto?")) { db=[]; notes=[]; render(); } }
        function exportData() {
            const blob = new Blob([JSON.stringify({db, notes})], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = "myfinance_backup.json"; a.click();
        }
        function importData(e) {
            const reader = new FileReader();
            reader.onload = (f) => { const data = JSON.parse(f.target.result); db = data.db; notes = data.notes; render(); };
            reader.readAsText(e.target.files[0]);
        }

        render();
    </script>
</body>
</html>
