<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
<script src="script.js"></script>
</head>

<body onload="loadProjects()">

<div class="main">

<!-- SIDEBAR -->
<div class="sidebar">
    <button onclick="location.href='calendar.html'">📅 Calendario</button>
    <button onclick="location.href='dashboard.html'">📊 Dashboard mensile</button>
    <button onclick="location.href='annual.html'">📈 Dashboard annuale</button>
</div>

<!-- CONTENT -->
<div class="content">

    <!-- SINISTRA -->
    <div class="left-panel">
        <h3>Progetti</h3>

        <table id="projectTable">
            <thead>
                <tr>
                    <th>Progetto</th>
                    <th>Attività</th>
                    <th>Resp.</th>
                    <th>Scost.</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <button onclick="addProject()">+ Aggiungi</button>
    </div>

    <!-- DESTRA -->
    <div class="right-panel">

        <div class="card">
            <h3>Dashboard</h3>
        </div>

        <div class="grid">
            <div class="small-card yellow">Spese</div>
            <div class="small-card pink">Entrate</div>
            <div class="small-card green">Risparmio</div>
            <div class="small-card orange">Budget</div>
        </div>

    </div>

</div>
</div>

</body>
</html>
