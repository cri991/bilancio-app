<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MyFinance Pro - Shift Tracker</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-user-select: none; touch-action: manipulation; }
        #app-container { display: flex; height: 100vh; width: 100%; overflow: hidden; }
        
        @media (max-width: 768px) {
            aside { position: fixed; top: 0; left: -100%; width: 80% !important; height: 100vh; z-index: 999; transition: left 0.3s ease; }
            aside.mobile-open { left: 0; }
            #mobile-menu-trigger { display: flex !important; }
        }

        .sidebar-link.active { background: #4f46e5 !important; color: white !important; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4); }
        .content-section { display: none; }
        .content-section.active { display: block !important; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .work-day.has-hours { border-bottom: 4px solid #10b981; }
        .work-day.selected { background: #eef2ff; border: 2px solid #4f46e5; }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center">

    <button id="mobile-menu-trigger" onclick="toggleMobileSidebar()" class="fixed bottom-6 right-6 w-16 h-16 bg-indigo-600 text-white rounded-full hidden items-center justify-center z-[1000] shadow-2xl">
        <i class="fas fa-bars"></i>
    </button>

    <div id="app-container">
        <aside id="sidebar" class="w-72 bg-white border-r border-slate-200 flex flex-col p-8 justify-between shrink-0 bg-white">
            <div class="space-y-10">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white"><i class="fas fa-gem"></i></div>
                    <span class="font-black text-2xl tracking-tighter uppercase italic">MyFinance</span>
                </div>
                <nav class="space-y-2 text-slate-500 font-bold">
                    <button onclick="showSection('home')" id="btn-home" class="sidebar-link active w-full flex items-center space-x-4 p-4 rounded-2xl"><i class="fas fa-home"></i> <span>Dashboard</span></button>
                    <button onclick="showSection('lavoro')" id="btn-lavoro" class="sidebar-link w-full flex items-center space-x-4 p-4 rounded-2xl"><i class="fas fa-clock"></i> <span>Ore Lavoro</span></button>
                    <button onclick="showSection('spese')" id="btn-spese" class="sidebar-link w-full flex items-center space-x-4 p-4 rounded-2xl"><i class="fas fa-receipt"></i> <span>Spese Fisse</span></button>
                    <button onclick="showSection('variabili')" id="btn-variabili" class="sidebar-link w-full flex items-center space-x-4 p-4 rounded-2xl"><i class="fas fa-shopping-cart"></i> <span>Variabili</span></button>
                    <button onclick="showSection('calendario')" id="btn-calendario" class="sidebar-link w-full flex items-center space-x-4 p-4 rounded-2xl"><i class="fas fa-calendar-alt"></i> <span>Note/Memo</span></button>
                </nav>
            </div>
            <div class="pt-6 border-t border-slate-100 space-y-2">
                <button onclick="exportData()" class="w-full text-left p-3 text-[10px] font-black uppercase text-indigo-400"><i class="fas fa-download mr-2"></i> Esporta</button>
                <button onclick="resetApp()" class="w-full text-left p-3 text-[10px] font-black uppercase text-rose-400"><i class="fas fa-power-off mr-2"></i> Reset</button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-8 md:p-12">
            
            <div id="home" class="content-section active space-y-8">
                <h2 class="text-4xl font-black tracking-tighter uppercase italic">Resoconto</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-slate-900 p-8 rounded-[2.5rem] text-white shadow-2xl">
                        <p class="text-[10px] font-black uppercase opacity-50 tracking-widest mb-2">Totale Annuale <span id="year-label"></span></p>
                        <h3 id="h-guadagno-anno" class="text-5xl font-black">€ 0,00</h3>
                        <p id="h-ore-anno" class="mt-2 text-indigo-400 font-bold">0 ore totali</p>
                    </div>
                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm">
                        <p class="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-2">Mese Corrente</p>
                        <h3 id="h-guadagno-mese" class="text-4xl font-black text-slate-800">€ 0,00</h3>
                        <p id="h-ore-mese" class="mt-1 text-emerald-500 font-bold">0 ore lavorate</p>
                    </div>
                </div>

                <div class="bg-white p-8 rounded-[3rem] border flex flex-col items-center">
                    <h4 class="text-[10px] font-black uppercase text-slate-400 mb-6">Proporzione Budget Mensile</h4>
                    <div class="w-64 h-64"><canvas id="chartBilancio"></canvas></div>
                </div>
            </div>

            <div id="lavoro" class="content-section space-y-8">
                <div class="flex justify-between items-end">
                    <h2 class="text-4xl font-black tracking-tighter uppercase italic">Ore Lavoro</h2>
                    <div class="bg-white p-4 rounded-2xl shadow-sm border flex items-center space-x-4">
                        <span class="text-[10px] font-black text-slate-400 uppercase">Paga Oraria €</span>
                        <input type="number" id="paga-oraria" onchange="updatePaga()" value="10" class="w-16 font-black text-indigo-600 outline-none text-right">
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2 bg-white p-8 rounded-[3rem] border border-slate-200">
                        <div class="flex justify-between items-center mb-8">
                            <button onclick="changeWorkMonth(-1)" class="w-10 h-10 hover:bg-slate-100 rounded-full"><i class="fas fa-chevron-left"></i></button>
                            <span id="workMonthTitle" class="font-black uppercase tracking-widest"></span>
                            <button onclick="changeWorkMonth(1)" class="w-10 h-10 hover:bg-slate-100 rounded-full"><i class="fas fa-chevron-right"></i></button>
                        </div>
                        <div id="work-grid" class="grid grid-cols-7 gap-3 text-center"></div>
                    </div>

                    <div id="shift-panel" class="bg-slate-900 p-8 rounded-[2.5rem] text-white shadow-xl h-fit">
                        <h4 id="selectedWorkDay" class="text-xl font-black mb-6 italic text-indigo-400">Seleziona data</h4>
                        <div class="space-y-6">
                            <div>
                                <label class="text-[9px] font-black uppercase opacity-40 block mb-2">Inizio Turno</label>
                                <input type="time" id="time-start" class="w-full bg-white/10 p-4 rounded-xl font-black text-2xl outline-none border border-white/5">
                            </div>
                            <div>
                                <label class="text-[9px] font-black uppercase opacity-40 block mb-2">Fine Turno</label>
                                <input type="time" id="time-end" class="w-full bg-white/10 p-4 rounded-xl font-black text-2xl outline-none border border-white/5">
                            </div>
                            <button onclick="saveShift()" class="w-full bg-indigo-600 p-5 rounded-2xl font-black uppercase text-xs tracking-widest hover:bg-indigo-500 transition-all shadow-lg">Salva Turno</button>
                            <p id="shift-calc-preview" class="text-center text-[10px] font-bold text-emerald-400 uppercase"></p>
                        </div>
                    </div>
                </div>
            </div>

            <div id="spese" class="content-section space-y-6">
                <h2 class="text-4xl font-black tracking-tighter uppercase italic">Spese Fisse</h2>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="bg-white p-8 rounded-[2.5rem] border">
                        <input type="text" id="fissa-nome" placeholder="Nome Spesa" class="w-full p-4 bg-slate-50 rounded-xl mb-4 font-bold outline-none">
                        <input type="number" id="fissa-prezzo" placeholder="Prezzo €" class="w-full p-4 bg-slate-50 rounded-xl mb-4 font-black outline-none">
                        <button onclick="addItem('fissa')" class="w-full bg-slate-900 text-white p-4 rounded-xl font-black uppercase text-xs">Aggiungi</button>
                    </div>
                    <div id="lista-fisse" class="space-y-2"></div>
                </div>
            </div>

            <div id="variabili" class="content-section space-y-6">
                <h2 class="text-4xl font-black tracking-tighter uppercase italic">Spese Variabili</h2>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="bg-white p-8 rounded-[2.5rem] border">
                        <input type="text" id="var-nome" placeholder="Nome Spesa" class="w-full p-4 bg-slate-50 rounded-xl mb-4 font-bold outline-none">
                        <input type="number" id="var-prezzo" placeholder="Prezzo €" class="w-full p-4 bg-slate-50 rounded-xl mb-4 font-black outline-none">
                        <button onclick="addItem('variabile')" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-black uppercase text-xs">Aggiungi</button>
                    </div>
                    <div id="lista-variabili" class="space-y-2"></div>
                </div>
            </div>

            <div id="calendario" class="content-section space-y-6">
                <h2 class="text-4xl font-black tracking-tighter uppercase italic">Note</h2>
                <div class="bg-white p-8 rounded-[2.5rem] border">
                    <div id="note-grid" class="grid grid-cols-7 gap-2"></div>
                </div>
            </div>

        </main>
    </div>

    <script>
        // DATI
        let workData = JSON.parse(localStorage.getItem('myFinWork')) || {}; // Salva: { "d-m-y": { start: "06:00", end: "14:00", hours: 8 } }
        let fisse = JSON.parse(localStorage.getItem('myFinFisse')) || [];
        let variabili = JSON.parse(localStorage.getItem('myFinVariabili')) || [];
        let pagaOraria = localStorage.getItem('myFinPaga') || 10;
        
        let workViewDate = new Date();
        let selectedWorkKey = null;
        let chartBilancio = null;

        function toggleMobileSidebar() { document.getElementById('sidebar').classList.toggle('mobile-open'); }

        function showSection(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
            if(id === 'home') renderResoconto();
            if(id === 'lavoro') renderWork();
            if(window.innerWidth < 768) toggleMobileSidebar();
        }

        // --- LOGICA LAVORO (TURNI) ---
        function renderWork() {
            const grid = document.getElementById('work-grid'); const y = workViewDate.getFullYear(); const m = workViewDate.getMonth();
            document.getElementById('workMonthTitle').innerText = new Intl.DateTimeFormat('it-IT', {month:'long', year:'numeric'}).format(workViewDate);
            grid.innerHTML = ''; const first = new Date(y, m, 1).getDay() || 7; const last = new Date(y, m+1, 0).getDate();
            
            for(let i=1; i<first; i++) grid.innerHTML += '<div></div>';
            for(let d=1; d<=last; d++) {
                const k = `${d}-${m}-${y}`; const data = workData[k];
                const hasHours = data ? 'has-hours' : '';
                const isSel = selectedWorkKey === k ? 'selected' : '';
                grid.innerHTML += `<div onclick="selectWorkDay(${d},${m},${y})" class="work-day ${hasHours} ${isSel} p-4 rounded-xl border text-center cursor-pointer hover:bg-indigo-50 transition-all">
                    <span class="text-[10px] block font-black text-slate-300">${d}</span>
                    <span class="text-xs font-bold ${data?'text-indigo-600':'text-transparent'}">${data ? data.hours+'h' : '0h'}</span>
                </div>`;
            }
        }

        function selectWorkDay(d, m, y) {
            selectedWorkKey = `${d}-${m}-${y}`;
            const data = workData[selectedWorkKey];
            document.getElementById('selectedWorkDay').innerText = `${d}/${m+1}/${y}`;
            document.getElementById('time-start').value = data ? data.start : "";
            document.getElementById('time-end').value = data ? data.end : "";
            renderWork();
        }

        function saveShift() {
            if(!selectedWorkKey) return alert("Seleziona un giorno!");
            const start = document.getElementById('time-start').value;
            const end = document.getElementById('time-end').value;
            
            if(start && end) {
                const s = start.split(':'); const e = end.split(':');
                let diff = (new Date(0,0,0,e[0],e[1]) - new Date(0,0,0,s[0],s[1])) / 1000 / 60 / 60;
                if (diff < 0) diff += 24; // Gestione turno notte
                
                workData[selectedWorkKey] = { start, end, hours: diff.toFixed(2) };
            } else {
                delete workData[selectedWorkKey];
            }
            
            localStorage.setItem('myFinWork', JSON.stringify(workData));
            renderWork();
            renderResoconto();
        }

        // --- RESOCONTI ---
        function renderResoconto() {
            const now = new Date();
            const curM = now.getMonth();
            const curY = now.getFullYear();
            document.getElementById('year-label').innerText = curY;

            let oreMese = 0, oreAnno = 0;
            for(let k in workData) {
                const [d, m, y] = k.split('-').map(Number);
                const h = parseFloat(workData[k].hours);
                if(y === curY) {
                    oreAnno += h;
                    if(m === curM) oreMese += h;
                }
            }

            const guadagnoMese = oreMese * pagaOraria;
            const guadagnoAnno = oreAnno * pagaOraria;

            document.getElementById('h-guadagno-mese').innerText = `€ ${guadagnoMese.toLocaleString('it-IT', {minimumFractionDigits:2})}`;
            document.getElementById('h-ore-mese').innerText = `${oreMese.toFixed(1)} ore lavorate`;
            document.getElementById('h-guadagno-anno').innerText = `€ ${guadagnoAnno.toLocaleString('it-IT', {minimumFractionDigits:2})}`;
            document.getElementById('h-ore-anno').innerText = `${oreAnno.toFixed(1)} ore totali nell'anno`;

            updateChart(guadagnoMese);
        }

        function updateChart(guadagnoMese) {
            const ctx = document.getElementById('chartBilancio').getContext('2d');
            let tF = 0; fisse.forEach(s => tF += parseFloat(s.prezzo));
            let tV = 0; variabili.forEach(s => tV += parseFloat(s.prezzo));
            
            if(chartBilancio) chartBilancio.destroy();
            chartBilancio = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Entrate', 'Uscite Totali'],
                    datasets: [{
                        data: [guadagnoMese, tF + tV],
                        backgroundColor: ['#4f46e5', '#f43f5e'],
                        borderWidth: 0
                    }]
                },
                options: { cutout: '80%', plugins: { legend: { display: false } } }
            });
        }

        // UTILITY
        function updatePaga() { pagaOraria = document.getElementById('paga-oraria').value; localStorage.setItem('myFinPaga', pagaOraria); renderResoconto(); }
        function changeWorkMonth(s) { workViewDate.setMonth(workViewDate.getMonth()+s); renderWork(); }
        function addItem(t) { /* Logica spese simile a prima */ }
        function resetApp() { if(confirm("Cancellare tutto?")) { localStorage.clear(); location.reload(); } }

        // Avvio
        document.getElementById('paga-oraria').value = pagaOraria;
        renderResoconto();
    </script>
</body>
</html>
