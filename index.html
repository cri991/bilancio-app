<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyFinance Desktop Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-user-select: none; }
        .sidebar-link.active { background: #4f46e5 !important; color: white !important; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4); }
        .content-section { display: none; }
        .content-section.active { display: block !important; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .work-day.selected { border: 3px solid #4f46e5 !important; background: #eef2ff; }
        .work-day.has-hours { border-bottom: 4px solid #10b981; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden text-slate-900">

    <aside class="w-72 bg-white border-r border-slate-200 flex flex-col p-8 justify-between">
        <div class="space-y-10">
            <div class="flex items-center space-x-3">
                <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-lg"><i class="fas fa-vault fa-lg"></i></div>
                <span class="font-black text-2xl tracking-tighter uppercase italic">MyFinance</span>
            </div>
            <nav class="space-y-2">
                <button onclick="showSection('home')" id="btn-home" class="sidebar-link active w-full flex items-center space-x-4 p-4 rounded-2xl transition-all font-bold text-sm text-slate-500 hover:bg-slate-50"><i class="fas fa-home w-5"></i> <span>Dashboard Home</span></button>
                <button onclick="showSection('lavoro')" id="btn-lavoro" class="sidebar-link w-full flex items-center space-x-4 p-4 rounded-2xl transition-all font-bold text-sm text-slate-500 hover:bg-slate-50"><i class="fas fa-clock w-5"></i> <span>Ore Lavorative</span></button>
                <button onclick="showSection('spese')" id="btn-spese" class="sidebar-link w-full flex items-center space-x-4 p-4 rounded-2xl transition-all font-bold text-sm text-slate-500 hover:bg-slate-50"><i class="fas fa-receipt w-5"></i> <span>Spese Fisse</span></button>
                <button onclick="showSection('variabili')" id="btn-variabili" class="sidebar-link w-full flex items-center space-x-4 p-4 rounded-2xl transition-all font-bold text-sm text-slate-500 hover:bg-slate-50"><i class="fas fa-shopping-cart w-5"></i> <span>Spese Variabili</span></button>
                <button onclick="showSection('calendario')" id="btn-calendario" class="sidebar-link w-full flex items-center space-x-4 p-4 rounded-2xl transition-all font-bold text-sm text-slate-500 hover:bg-slate-50"><i class="fas fa-calendar-alt w-5"></i> <span>Calendario / Note</span></button>
            </nav>
        </div>
        <div class="pt-6 border-t border-slate-100">
            <button onclick="resetApp()" class="w-full text-left p-3 text-[10px] font-black uppercase text-rose-400 hover:bg-rose-50 rounded-xl tracking-widest italic"><i class="fas fa-power-off mr-2"></i> Reset Dati</button>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-12 bg-slate-50">
        
        <div id="home" class="content-section active space-y-10">
            <h2 class="text-4xl font-black tracking-tighter uppercase">Riepilogo Generale</h2>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="bg-white p-10 rounded-[3rem] shadow-sm border border-slate-100"><span class="text-[10px] font-black text-slate-300 uppercase tracking-widest">Guadagno Anno Corrente</span><h3 id="h-guadagno-anno" class="text-5xl font-black mt-2 tracking-tighter text-indigo-600">€ 0,00</h3></div>
                <div class="bg-white p-8 rounded-[2.5rem] border-l-8 border-rose-500 shadow-sm"><p class="text-xs font-bold uppercase text-rose-500">Uscite Fisse</p><h4 id="h-fisse-home" class="text-3xl font-black mt-1">€ 0,00</h4></div>
                <div class="bg-white p-8 rounded-[2.5rem] border-l-8 border-orange-500 shadow-sm"><p class="text-xs font-bold uppercase text-orange-500">Uscite Variabili</p><h4 id="h-var-home" class="text-3xl font-black mt-1">€ 0,00</h4></div>
            </div>
        </div>

        <div id="lavoro" class="content-section space-y-10">
            <div class="flex justify-between items-end">
                <div>
                    <h2 class="text-4xl font-black tracking-tighter uppercase text-slate-800">Ore Lavorative</h2>
                    <p class="text-slate-400 font-medium italic mt-1 uppercase text-[10px] tracking-widest">Tracciamento tempo e profitti</p>
                </div>
                <div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm flex items-center space-x-4">
                    <span class="text-[10px] font-black uppercase text-slate-400">Paga Oraria €</span>
                    <input type="number" id="paga-oraria" onchange="renderWork()" value="10" class="w-20 p-2 rounded-xl bg-slate-50 border-none font-black text-center text-indigo-600">
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 bg-white p-8 rounded-[3rem] shadow-sm border border-slate-100">
                    <div class="flex justify-between items-center mb-8">
                        <button onclick="changeWorkMonth(-1)" class="w-10 h-10 rounded-xl hover:bg-slate-50"><i class="fas fa-chevron-left"></i></button>
                        <span id="workMonthTitle" class="font-black text-lg uppercase tracking-widest"></span>
                        <button onclick="changeWorkMonth(1)" class="w-10 h-10 rounded-xl hover:bg-slate-50"><i class="fas fa-chevron-right"></i></button>
                    </div>
                    <div id="work-grid" class="grid grid-cols-7 gap-3"></div>
                </div>

                <div class="space-y-6">
                    <div class="bg-slate-900 p-8 rounded-[2.5rem] text-white shadow-xl">
                        <span class="text-[10px] font-bold uppercase opacity-50 tracking-widest">Giorno Selezionato</span>
                        <h4 id="selectedWorkDay" class="text-xl font-black mb-6 mt-1 italic">Nessuno</h4>
                        <div class="space-y-4">
                            <label class="text-[10px] font-bold uppercase block">Ore Effettuate</label>
                            <input type="number" step="0.5" id="work-hours-input" placeholder="Es. 8.5" class="w-full p-4 rounded-2xl bg-white/10 border-none text-white font-black text-2xl focus:ring-2 focus:ring-indigo-500">
                            <button onclick="saveHours()" class="w-full bg-indigo-500 p-4 rounded-2xl font-black uppercase text-[10px] tracking-widest hover:bg-indigo-400">Salva Ore</button>
                        </div>
                    </div>
                    
                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100">
                        <div class="flex justify-between items-center border-b pb-4 mb-4">
                            <span class="text-[10px] font-black uppercase text-slate-400">Totale Ore Mese</span>
                            <span id="month-total-hours" class="font-black text-xl italic">0 h</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-[10px] font-black uppercase text-slate-400">Guadagno Mese</span>
                            <span id="month-total-euro" class="font-black text-2xl text-emerald-500 italic">€ 0,00</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="spese" class="content-section space-y-10">
            <h2 class="text-4xl font-black tracking-tighter uppercase">Spese Fisse</h2>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                <div class="lg:col-span-1 bg-white p-8 rounded-[3rem] border border-slate-100 h-fit">
                    <input type="text" id="fissa-nome" placeholder="Nome spesa" class="w-full p-4 rounded-2xl bg-slate-50 mb-4 font-bold">
                    <input type="number" id="fissa-prezzo" placeholder="Importo €" class="w-full p-4 rounded-2xl bg-slate-50 mb-4 font-black">
                    <button onclick="addItem('fissa')" class="w-full bg-slate-900 text-white font-black p-5 rounded-2xl uppercase text-xs italic">Aggiungi</button>
                </div>
                <div class="lg:col-span-2 bg-white p-8 rounded-[3rem] border border-slate-100">
                    <div id="lista-fisse" class="divide-y"></div>
                    <div class="mt-6 pt-6 border-t text-right"><span id="tot-fisse" class="text-3xl font-black text-indigo-600 italic">€ 0,00</span></div>
                </div>
            </div>
        </div>

        <div id="variabili" class="content-section space-y-10">
            <h2 class="text-4xl font-black tracking-tighter uppercase">Spese Variabili</h2>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                <div class="lg:col-span-1 bg-white p-8 rounded-[3rem] border border-slate-100 h-fit">
                    <input type="text" id="var-nome" placeholder="Nome spesa" class="w-full p-4 rounded-2xl bg-slate-50 mb-4 font-bold">
                    <input type="number" id="var-prezzo" placeholder="Importo €" class="w-full p-4 rounded-2xl bg-slate-50 mb-4 font-black">
                    <button onclick="addItem('variabile')" class="w-full bg-indigo-600 text-white font-black p-5 rounded-2xl uppercase text-xs italic">Aggiungi</button>
                </div>
                <div class="lg:col-span-2 bg-white p-8 rounded-[3rem] border border-slate-100">
                    <div id="lista-variabili" class="divide-y"></div>
                    <div class="mt-6 pt-6 border-t text-right"><span id="tot-variabili" class="text-3xl font-black text-emerald-500 italic">€ 0,00</span></div>
                </div>
            </div>
        </div>

    </main>

    <script>
        let fisse = JSON.parse(localStorage.getItem('myFinFisse')) || [];
        let variabili = JSON.parse(localStorage.getItem('myFinVariabili')) || [];
        let workData = JSON.parse(localStorage.getItem('myFinWork')) || {}; // Formato: {"D-M-Y": ore}
        let pagaOraria = localStorage.getItem('myFinPaga') || 10;

        let currentViewDate = new Date();
        let workViewDate = new Date();
        let selectedWorkKey = null;

        function showSection(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
            if(id === 'lavoro') renderWork();
            render();
        }

        // GESTIONE ORE LAVORO
        function renderWork() {
            const grid = document.getElementById('work-grid');
            const y = workViewDate.getFullYear();
            const m = workViewDate.getMonth();
            pagaOraria = document.getElementById('paga-oraria').value;
            localStorage.setItem('myFinPaga', pagaOraria);

            document.getElementById('workMonthTitle').innerText = new Intl.DateTimeFormat('it-IT', { month: 'long', year: 'numeric' }).format(workViewDate);
            grid.innerHTML = '';

            const first = new Date(y, m, 1).getDay() || 7;
            const last = new Date(y, m + 1, 0).getDate();

            let oreMese = 0;
            for(let i = 1; i < first; i++) grid.innerHTML += `<div></div>`;
            for(let d = 1; d <= last; d++) {
                const key = `${d}-${m}-${y}`;
                const ore = workData[key] || 0;
                oreMese += parseFloat(ore);
                const hasHours = ore > 0 ? 'has-hours' : '';
                const isSelected = selectedWorkKey === key ? 'selected' : '';
                
                grid.innerHTML += `
                    <div onclick="selectWorkDay(${d},${m},${y})" class="work-day ${hasHours} ${isSelected} p-4 rounded-2xl bg-white border border-slate-100 text-center cursor-pointer transition-all hover:shadow-md">
                        <span class="text-[10px] block font-black text-slate-300 uppercase">${d}</span>
                        <span class="text-xs font-bold ${ore > 0 ? 'text-indigo-600' : 'text-slate-200'}">${ore > 0 ? ore + 'h' : '-'}</span>
                    </div>`;
            }

            document.getElementById('month-total-hours').innerText = `${oreMese} h`;
            document.getElementById('month-total-euro').innerText = `€ ${(oreMese * pagaOraria).toLocaleString('it-IT', {minimumFractionDigits: 2})}`;
            calculateYearly();
        }

        function selectWorkDay(d, m, y) {
            selectedWorkKey = `${d}-${m}-${y}`;
            document.getElementById('selectedWorkDay').innerText = `${d} ${new Intl.DateTimeFormat('it-IT', {month:'long'}).format(new Date(y,m,d))} ${y}`;
            document.getElementById('work-hours-input').value = workData[selectedWorkKey] || '';
            renderWork();
        }

        function saveHours() {
            if(!selectedWorkKey) return alert("Seleziona un giorno!");
            const h = document.getElementById('work-hours-input').value;
            if(h > 0) workData[selectedWorkKey] = h;
            else delete workData[selectedWorkKey];
            localStorage.setItem('myFinWork', JSON.stringify(workData));
            renderWork();
        }

        function changeWorkMonth(s) {
            workViewDate.setMonth(workViewDate.getMonth() + s);
            renderWork();
        }

        function calculateYearly() {
            const currentYear = workViewDate.getFullYear();
            let totOreAnno = 0;
            for (let key in workData) {
                if (key.endsWith(`-${currentYear}`)) {
                    totOreAnno += parseFloat(workData[key]);
                }
            }
            document.getElementById('h-guadagno-anno').innerText = `€ ${(totOreAnno * pagaOraria).toLocaleString('it-IT')}`;
        }

        // GESTIONE SPESE (VECCHIA LOGICA MANTENUTA)
        function addItem(tipo) {
            const n = document.getElementById(tipo === 'fissa' ? 'fissa-nome' : 'var-nome').value;
            const p = document.getElementById(tipo === 'fissa' ? 'fissa-prezzo' : 'var-prezzo').value;
            if(n && p) {
                if(tipo === 'fissa') fisse.push({nome: n, prezzo: p});
                else variabili.push({nome: n, prezzo: p});
                render();
            }
        }

        function delItem(tipo, i) {
            if(tipo === 'fissa') fisse.splice(i, 1);
            else variabili.splice(i, 1);
            render();
        }

        function render() {
            // Render Fisse
            const fList = document.getElementById('lista-fisse');
            fList.innerHTML = ''; let totF = 0;
            fisse.forEach((s, i) => {
                totF += parseFloat(s.prezzo);
                fList.innerHTML += `<div class="flex justify-between items-center py-4"><span class="text-xs font-black uppercase">${s.nome}</span><button onclick="delItem('fissa', ${i})">€ ${s.prezzo} <i class="fas fa-times ml-2 text-rose-300"></i></button></div>`;
            });
            document.getElementById('tot-fisse').innerText = `€ ${totF.toLocaleString('it-IT')}`;

            // Render Variabili
            const vList = document.getElementById('lista-variabili');
            vList.innerHTML = ''; let totV = 0;
            variabili.forEach((s, i) => {
                totV += parseFloat(s.prezzo);
                vList.innerHTML += `<div class="flex justify-between items-center py-4"><span class="text-xs font-black uppercase">${s.nome}</span><button onclick="delItem('variabile', ${i})">€ ${s.prezzo} <i class="fas fa-times ml-2 text-rose-300"></i></button></div>`;
            });
            document.getElementById('tot-variabili').innerText = `€ ${totV.toLocaleString('it-IT')}`;

            document.getElementById('h-fisse-home').innerText = `€ ${totF.toLocaleString('it-IT')}`;
            document.getElementById('h-var-home').innerText = `€ ${totV.toLocaleString('it-IT')}`;
            
            localStorage.setItem('myFinFisse', JSON.stringify(fisse));
            localStorage.setItem('myFinVariabili', JSON.stringify(variabili));
            calculateYearly();
        }

        function resetApp() { if(confirm("Cancellare tutto?")) { localStorage.clear(); location.reload(); } }

        render();
        document.getElementById('paga-oraria').value = pagaOraria;
    </script>
</body>
</html>
