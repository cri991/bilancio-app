<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilancio App - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f4f7fa; --white: #ffffff; --primary: #3b82f6; --text: #334155; --border: #e2e8f0; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Unificata */
        .sidebar { width: 90px; background: var(--white); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 25px 0; flex-shrink: 0; }
        .nav-link { color: #cbd5e0; font-size: 24px; margin: 18px 0; text-decoration: none; transition: 0.3s; }
        .nav-link.active { color: var(--primary); }
        .logout { margin-top: auto; color: #cbd5e0; cursor: pointer; }

        /* Layout Main */
        .main-content { flex-grow: 1; padding: 25px; display: grid; grid-template-columns: 360px 1fr; grid-template-rows: auto 1fr; gap: 20px; overflow-y: auto; }
        .card { background: var(--white); border-radius: 18px; padding: 22px; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.02); }

        /* Tabella Movimenti Automatica */
        .data-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .data-table th { text-align: left; padding: 12px; font-size: 13px; color: #64748b; border-bottom: 2px solid var(--border); }
        .data-table td { padding: 12px; font-size: 14px; border-bottom: 1px solid #f1f5f9; }
        .row-cat { background: #e0f2fe; font-weight: bold; color: #0369a1; }
        .pos { color: #10b981; font-weight: 600; }
        .neg { color: #ef4444; font-weight: 600; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <a href="#" class="nav-link"><i class="fas fa-th-large"></i></a>
        <a href="index.html" class="nav-link active"><i class="fas fa-home"></i></a>
        <a href="calendario.html" class="nav-link"><i class="fas fa-calendar-alt"></i></a>
        <a href="resoconto.html" class="nav-link"><i class="fas fa-chart-line"></i></a>
        <a href="guadagni.html" class="nav-link"><i class="fas fa-wallet"></i></a>
        <div class="logout"><i class="fas fa-power-off"></i></div>
    </nav>

    <div class="main-content">
        <div class="card" style="grid-column: 1 / 3;">
            <h2 style="margin:0; font-size: 18px; color:#64748b;">Totale Netto Attuale</h2>
            <div id="netto-display" style="font-size: 48px; font-weight: 800; color: var(--primary);">€ 0,00</div>
        </div>

        <div class="card" style="grid-column: 1 / 3;">
            <h3>Dettaglio Movimenti (Automatico)</h3>
            <table class="data-table">
                <thead>
                    <tr><th>Categoria</th><th>Descrizione</th><th>Responsabile</th><th>Importo</th></tr>
                </thead>
                <tbody id="tabella-corpo">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        function aggiornaHome() {
            const dati = JSON.parse(localStorage.getItem('database_bilancio')) || { entrate: [], uscite: [] };
            const corpo = document.getElementById('tabella-corpo');
            let totaleEntrate = 0;
            let totaleUscite = 0;
            let html = '';

            // Render Entrate
            html += '<tr class="row-cat"><td colspan="4">Resoconto Entrate</td></tr>';
            dati.entrate.forEach(e => {
                totaleEntrate += parseFloat(e.importo);
                html += `<tr><td>${e.cat}</td><td>${e.desc}</td><td>${e.resp}</td><td class="pos">+ € ${e.importo}</td></tr>`;
            });

            // Render Uscite
            html += '<tr class="row-cat"><td colspan="4">Resoconto Uscite</td></tr>';
            dati.uscite.forEach(u => {
                totaleUscite += parseFloat(u.importo);
                html += `<tr><td>${u.cat}</td><td>${u.desc}</td><td>${u.resp}</td><td class="neg">- € ${u.importo}</td></tr>`;
            });

            corpo.innerHTML = html;
            const netto = totaleEntrate - totaleUscite;
            document.getElementById('netto-display').innerText = `€ ${netto.toLocaleString('it-IT', {minimumFractionDigits: 2})}`;
            document.getElementById('netto-display').style.color = netto >= 0 ? '#10b981' : '#ef4444';
        }

        window.onload = aggiornaHome;
    </script>
</body>
</html>
