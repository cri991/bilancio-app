<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilancio App - Analisi Strategica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .card-gradient-attivo { background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%); }
        .card-gradient-passivo { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 pb-20">

    <div id="app" class="max-w-6xl mx-auto p-4 md:p-8 space-y-10">
        
        <header class="flex flex-col md:flex-row justify-between items-center border-b border-gray-200 pb-8">
            <div>
                <h1 class="text-4xl font-black tracking-tighter uppercase">Analisi Strategica</h1>
                <p class="text-gray-500 font-medium">Gestione flussi di cassa e previsioni</p>
            </div>
            <div class="mt-4 md:mt-0 bg-white px-4 py-2 rounded-full shadow-sm border border-gray-100 flex items-center">
                <span class="w-3 h-3 bg-green-500 rounded-full animate-pulse mr-2"></span>
                <span class="text-xs font-bold uppercase text-gray-600">Sistema Attivo</span>
            </div>
        </header>

        <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-[2rem] shadow-xl shadow-gray-200/50 border border-gray-50">
                <p class="text-xs font-black text-gray-400 uppercase tracking-widest">Entrate Previste</p>
                <h2 id="entrate-previste" class="text-3xl font-black text-emerald-600 mt-2">€ 0,00</h2>
                <div class="mt-4 text-[10px] font-bold text-emerald-500 bg-emerald-50 inline-block px-2 py-1 rounded">CREDITI ATTIVI</div>
            </div>

            <div class="bg-white p-6 rounded-[2rem] shadow-xl shadow-gray-200/50 border border-gray-50">
                <p class="text-xs font-black text-gray-400 uppercase tracking-widest">Uscite Pendenti</p>
                <h2 id="uscite-pendenti" class="text-3xl font-black text-rose-600 mt-2">€ 0,00</h2>
                <div class="mt-4 text-[10px] font-bold text-rose-500 bg-rose-50 inline-block px-2 py-1 rounded">DEBITI DA SALDARE</div>
            </div>

            <div id="card-saldo" class="p-6 rounded-[2rem] shadow-xl text-white transition-colors duration-500">
                <p id="label-saldo" class="text-xs font-black opacity-80 uppercase tracking-widest italic">Saldo Futuro</p>
                <h2 id="saldo-netto" class="text-3xl font-black mt-2">€ 0,00</h2>
                <div class="mt-4 text-[10px] font-black bg-white/20 inline-block px-2 py-1 rounded uppercase">Risultato Strategico</div>
            </div>
        </section>

        <section class="bg-gray-900 p-8 rounded-[2.5rem] shadow-2xl">
            <h3 class="text-white font-black mb-6 uppercase text-sm tracking-widest">Nuova Registrazione</h3>
            <form id="form-movimento" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="desc" placeholder="Descrizione" class="p-4 rounded-2xl bg-gray-800 text-white border-none focus:ring-2 focus:ring-indigo-500 outline-none font-medium" required>
                <input type="number" id="valore" placeholder="Importo €" class="p-4 rounded-2xl bg-gray-800 text-white border-none focus:ring-2 focus:ring-indigo-500 outline-none font-bold" required>
                <div class="grid grid-cols-2 gap-2">
                    <select id="tipo" class="p-4 rounded-2xl bg-gray-800 text-white font-bold text-xs uppercase cursor-pointer">
                        <option value="entrata">Entrata</option>
                        <option value="uscita">Uscita</option>
                    </select>
                    <select id="stato" class="p-4 rounded-2xl bg-gray-800 text-white font-bold text-xs uppercase cursor-pointer">
                        <option value="saldato">Saldato</option>
                        <option value="pendente">Pendente</option>
                    </select>
                </div>
                <button type="submit" class="bg-indigo-500 hover:bg-indigo-400 text-white font-black rounded-2xl p-4 transition-all uppercase text-sm shadow-lg shadow-indigo-500/20">Aggiungi</button>
            </form>
        </section>

        <section class="space-y-4">
            <h3 class="text-xs font-black text-gray-400 uppercase tracking-[0.4em] ml-4">Cronologia Recente</h3>
            <div id="lista-container" class="space-y-3">
                </div>
        </section>

    </div>

    <script>
        // DATI APP
        let movimenti = JSON.parse(localStorage.getItem('movimenti')) || [];

        const form = document.getElementById('form-movimento');
        const listaContainer = document.getElementById('lista-container');

        // FUNZIONE PER AGGIORNARE I CALCOLI
        function aggiornaAnalisi() {
            const entrateP = movimenti.filter(m => m.tipo === 'entrata' && m.stato === 'pendente').reduce((s, m) => s + Number(m.valore), 0);
            const usciteP = movimenti.filter(m => m.tipo === 'uscita' && m.stato === 'pendente').reduce((s, m) => s + Number(m.valore), 0);
            const netto = entrateP - usciteP;

            document.getElementById('entrate-previste').innerText = `€ ${entrateP.toLocaleString('it-IT')}`;
            document.getElementById('uscite-pendenti').innerText = `€ ${usciteP.toLocaleString('it-IT')}`;
            document.getElementById('saldo-netto').innerText = `€ ${Math.abs(netto).toLocaleString('it-IT')}`;

            const cardSaldo = document.getElementById('card-saldo');
            const labelSaldo = document.getElementById('label-saldo');
            
            if (netto >= 0) {
                cardSaldo.className = 'p-6 rounded-[2rem] shadow-xl text-white transition-all duration-500 card-gradient-attivo';
                labelSaldo.innerText = 'Saldo Attivo Previsto';
            } else {
                cardSaldo.className = 'p-6 rounded-[2rem] shadow-xl text-white transition-all duration-500 card-gradient-passivo';
                labelSaldo.innerText = 'Saldo Passivo Previsto';
            }
        }

        // FUNZIONE PER DISEGNARE LA LISTA
        function renderLista() {
            listaContainer.innerHTML = '';
            movimenti.forEach((m, index) => {
                const div = document.createElement('div');
                div.className = 'bg-white p-5 rounded-3xl border border-gray-100 flex items-center justify-between hover:shadow-md transition-all group';
                
                div.innerHTML = `
                    <div class="flex items-center space-x-4">
                        <button onclick="toggleStato(${index})" class="p-3 rounded-xl ${m.stato === 'saldato' ? 'bg-emerald-50 text-emerald-600' : 'bg-amber-50 text-amber-600 animate-pulse'}">
                            ${m.stato === 'saldato' ? '✓' : '⌛'}
                        </button>
                        <div>
                            <p class="font-black text-gray-800 uppercase text-xs tracking-tight">${m.desc}</p>
                            <p class="text-[9px] font-bold text-gray-300 uppercase">${m.stato}</p>
                        </div>
                    </div>
                    <div class="text-lg font-black ${m.tipo === 'entrata' ? 'text-emerald-500' : 'text-rose-500'}">
                        ${m.tipo === 'entrata' ? '+' : '-'} €${Number(m.valore).toFixed(2)}
                    </div>
                `;
                listaContainer.appendChild(div);
            });
            localStorage.setItem('movimenti', JSON.stringify(movimenti));
            aggiornaAnalisi();
        }

        // AZIONE: AGGIUNGI MOVIMENTO
        form.onsubmit = (e) => {
            e.preventDefault();
            const nuovo = {
                desc: document.getElementById('desc').value,
                valore: document.getElementById('valore').value,
                tipo: document.getElementById('tipo').value,
                stato: document.getElementById('stato').value
            };
            movimenti.unshift(nuovo);
            form.reset();
            renderLista();
        };

        // AZIONE: CAMBIA STATO
        window.toggleStato = (index) => {
            movimenti[index].stato = movimenti[index].stato === 'saldato' ? 'pendente' : 'saldato';
            renderLista();
        };

        // AVVIO INIZIALE
        renderLista();
    </script>
</body>
</html>
