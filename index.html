<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Bilancio PRO</title>
    <script src="https://jsdelivr.net"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --primary: #0047FF;
            --bg: #F0F4F8;
            --card: #FFFFFF;
            --text: #1A1A1B;
            --green: #27AE60;
            --red: #EB5757;
            --yellow: #F2C94C;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Titolo PRO */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 48px;
            margin: 0;
            color: var(--primary);
            text-transform: uppercase;
        }

        .header span {
            color: #000;
        }

        /* Dashboard Top Metrics */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .circle-container {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 15px;
        }

        .metric-title {
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .metric-value {
            font-size: 20px;
            font-weight: 700;
        }

        /* Middle Charts Section */
        .charts-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .chart-card {
            background: var(--card);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        /* Colori dinamici per i titoli */
        .red-text { color: var(--red); }
        .green-text { color: var(--green); }
        .yellow-text { color: var(--yellow); }
        .blue-text { color: var(--primary); }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1><span>Gestione</span> Bilancio PRO</h1>
    </div>

    <!-- Top KPI Bar -->
    <div class="metrics-grid">
        <div class="card">
            <div class="metric-title green-text">REDDITO</div>
            <div class="circle-container">
                <canvas id="chartReddito"></canvas>
            </div>
            <div class="metric-value">€ 2.750</div>
        </div>
        <div class="card">
            <div class="metric-title red-text">SPESE</div>
            <div class="circle-container">
                <canvas id="chartSpese"></canvas>
            </div>
            <div class="metric-value">€ 1.450</div>
        </div>
        <div class="card">
            <div class="metric-title yellow-text">RISPARMI</div>
            <div class="circle-container">
                <canvas id="chartRisparmi"></canvas>
            </div>
            <div class="metric-value">€ 1.050</div>
        </div>
        <div class="card">
            <div class="metric-title blue-text">DEBITI</div>
            <div class="circle-container">
                <canvas id="chartDebiti"></canvas>
            </div>
            <div class="metric-value">€ 250</div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="charts-grid">
        <div class="chart-card">
            <h3 style="margin-top:0">Andamento Mensile (Ottobre)</h3>
            <canvas id="mainBarChart" height="150"></canvas>
        </div>
        <div class="chart-card">
            <h3 style="margin-top:0">Distribuzione Spese</h3>
            <canvas id="mainPieChart"></canvas>
        </div>
    </div>
</div>

<script>
    // Funzione per creare i cerchi (Doughnut charts) in alto
    function createCircle(id, color, percent) {
        new Chart(document.getElementById(id), {
            type: 'doughnut',
            data: {
                datasets: [{
                    data: [percent, 100 - percent],
                    backgroundColor: [color, '#f0f0f0'],
                    borderWidth: 0
                }]
            },
            options: { cutout: '80%', events: [], plugins: { tooltip: { enabled: false } } }
        });
    }

    createCircle('chartReddito', '#27AE60', 85);
    createCircle('chartSpese', '#EB5757', 55);
    createCircle('chartRisparmi', '#F2C94C', 35);
    createCircle('chartDebiti', '#0047FF', 15);

    // Grafico a Barre Principale
    new Chart(document.getElementById('mainBarChart'), {
        type: 'bar',
        data: {
            labels: ['Lun', 'Mar', 'Mer', 'Gio', 'Ven', 'Sab', 'Dom'],
            datasets: [{
                label: 'Speso (€)',
                data: [120, 190, 30, 50, 200, 300, 45],
                backgroundColor: '#0047FF'
            }]
        },
        options: { responsive: true, plugins: { legend: { display: false } } }
    });

    // Grafico a Torta (Pie)
    new Chart(document.getElementById('mainPieChart'), {
        type: 'pie',
        data: {
            labels: ['Affitto', 'Cibo', 'Auto', 'Svago'],
            datasets: [{
                data: [700, 350, 200, 200],
                backgroundColor: ['#0047FF', '#EB5757', '#F2C94C', '#27AE60']
            }]
        }
    });
</script>

</body>
</html>
