<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bilancio Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
margin:0;
font-family:-apple-system;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
}

/* GLASS */
.card {
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border-radius:20px;
padding:15px;
margin:10px;
}

.grid {
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin:10px;
}

.box {
padding:15px;
border-radius:15px;
text-align:center;
font-weight:bold;
}

.green{background:#2ecc71;}
.red{background:#e74c3c;}
.blue{background:#3498db;}
.purple{background:#9b59b6;}

input {
width:100%;
padding:10px;
margin:5px 0;
border-radius:10px;
border:none;
}

/* LOCK */
#lockScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0f172a;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}
</style>
</head>

<body>

<!-- 🔐 LOCK -->
<div id="lockScreen">
<h2>🔐 Accesso Sicuro</h2>
<input type="password" id="password">
<button onclick="login()">Accedi</button>
</div>

<!-- HEADER -->
<div style="display:flex;justify-content:space-between;padding:10px;">
<h2>💎 Bilancio</h2>
<button onclick="logout()">Logout</button>
</div>

<!-- MESE -->
<div style="text-align:center;">
<button onclick="prevMonth()">◀</button>
<span id="mese"></span>
<button onclick="nextMonth()">▶</button>
</div>

<!-- KPI -->
<div class="grid">
<div class="box green">Entrate<br><span id="totEntrate">0</span></div>
<div class="box red">Spese<br><span id="totSpese">0</span></div>
<div class="box blue">Risparmio<br><span id="risparmio">0</span></div>
<div class="box purple">Margine<br><span id="margine">0%</span></div>
</div>

<!-- INPUT -->
<div class="card">
<h3>Entrate</h3>
<input id="stipendio" placeholder="Stipendio">
<input id="extra" placeholder="Extra">
</div>

<div class="card">
<h3>Spese</h3>
<input id="affitto" placeholder="Affitto">
<input id="bollette" placeholder="Bollette">
<input id="spesa" placeholder="Spesa">
</div>

<!-- GRAFICO -->
<div class="card">
<canvas id="grafico"></canvas>
</div>

<!-- CALENDARIO -->
<div class="card">
<h3>📅 Promemoria</h3>
<input type="date" id="data">
<input id="testo" placeholder="Scrivi spesa">
<button onclick="aggiungi()">Aggiungi</button>
<ul id="lista"></ul>
</div>

<!-- CAMBIO PASSWORD -->
<div class="card">
<h3>🔐 Cambia Password</h3>
<input type="password" id="oldPass" placeholder="Vecchia">
<input type="password" id="newPass" placeholder="Nuova">
<button onclick="changePassword()">Aggiorna</button>
</div>

<script>

// HASH SEMPLICE
function hash(str){
return btoa(str);
}

// PASSWORD
let PASSWORD = localStorage.getItem("password");

if(!PASSWORD){
PASSWORD = hash("1234");
localStorage.setItem("password", PASSWORD);
}

// LOGIN
function login(){
let input = hash(document.getElementById("password").value);

if(input===PASSWORD){
document.getElementById("lockScreen").style.display="none";
localStorage.setItem("login","ok");
startTimer();
}else{
alert("Password errata");
}
}

// LOGOUT
function logout(){
localStorage.removeItem("login");
document.getElementById("lockScreen").style.display="flex";
}

// AUTO LOGIN
if(localStorage.getItem("login")==="ok"){
document.getElementById("lockScreen").style.display="none";
startTimer();
}

// CAMBIO PASSWORD
function changePassword(){

let oldInput = document.getElementById("oldPass").value;
let newInput = document.getElementById("newPass").value;

if(hash(oldInput) !== PASSWORD){
alert("Password attuale errata");
return;
}

if(newInput.length < 4){
alert("Password troppo corta");
return;
}

let nuovaHash = hash(newInput);

PASSWORD = nuovaHash;
localStorage.setItem("password", nuovaHash);

alert("Password aggiornata");

// reset campi
document.getElementById("oldPass").value="";
document.getElementById("newPass").value="";
}
}

// TIMER SICUREZZA
let timeout;
function startTimer(){
resetTimer();
document.onclick=resetTimer;
document.onkeypress=resetTimer;
}

function resetTimer(){
clearTimeout(timeout);
timeout=setTimeout(()=>{
logout();
},300000);
}

// MESE
let m=new Date().getMonth();
let a=new Date().getFullYear();
const mesi=["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"];

function aggiorna(){
mese.innerText=mesi[m]+" "+a;
carica();
caricaLista();
}

function nextMonth(){m++;if(m>11){m=0;a++}aggiorna();}
function prevMonth(){m--;if(m<0){m=11;a--}aggiorna();}

// CALCOLO
function calcola(){
let e=(+stipendio.value||0)+(+extra.value||0);
let s=(+affitto.value||0)+(+bollette.value||0)+(+spesa.value||0);

totEntrate.innerText=e;
totSpese.innerText=s;
risparmio.innerText=e-s;
margine.innerText=(e?((e-s)/e*100).toFixed(1):0)+"%";

salva();
grafico(e,s);
}

// SALVA
function salva(){
let dati={stipendio:stipendio.value,extra:extra.value,affitto:affitto.value,bollette:bollette.value,spesa:spesa.value};
localStorage.setItem("dati"+m+a,JSON.stringify(dati));
}

// CARICA
function carica(){
let d=JSON.parse(localStorage.getItem("dati"+m+a))||{};
stipendio.value=d.stipendio||"";
extra.value=d.extra||"";
affitto.value=d.affitto||"";
bollette.value=d.bollette||"";
spesa.value=d.spesa||"";
calcola();
}

// GRAFICO
let chart;
function grafico(e,s){
if(chart)chart.destroy();
chart=new Chart(grafico,{
type:'doughnut',
data:{labels:["Entrate","Spese"],datasets:[{data:[e,s]}]}
});
}

// EVENTI
document.querySelectorAll("input").forEach(i=>i.oninput=calcola);

// CALENDARIO
function aggiungi(){
let arr=JSON.parse(localStorage.getItem("sp"+m+a))||[];
arr.push(data.value+" - "+testo.value);
localStorage.setItem("sp"+m+a,JSON.stringify(arr));
caricaLista();
}

function caricaLista(){
let arr=JSON.parse(localStorage.getItem("sp"+m+a))||[];
lista.innerHTML="";
arr.forEach(e=>{
let li=document.createElement("li");
li.innerText=e;
lista.appendChild(li);
});
}

// SWIPE
let startX=0;
document.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
document.addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX;
if(startX-endX>50)nextMonth();
if(endX-startX>50)prevMonth();
});

aggiorna();

</script>

</body>
</html>
