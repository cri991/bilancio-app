<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilancio App Pro - Guadagni e Spese</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f3f4f6;
            --white: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --success: #10b981;
            --danger: #ef4444;
            --section-header-bg: #e0f2f1;
            --section-header-text: #00796b;
            --radius: 16px;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); margin: 0; padding: 20px; color: var(--text-main); }

        .wrapper { max-width: 1200px; margin: auto; }

        /* --- HEADER & NAVIGATION --- */
        header {
            background: var(--white);
            padding: 15px 30px;
            border-radius: var(--radius);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        .logo { font-weight: 800; font-size: 1.4rem; color: var(--primary); }
        
        nav { display: flex; gap: 10px; }
        nav button {
            border: none; background: none; padding: 10px 18px;
            border-radius: 10px; font-weight: 600; cursor: pointer;
            color: var(--text-muted); transition: 0.3s;
        }
        nav button.active { background: var(--primary); color: white; }

        .time-controls { display: flex; gap: 10px; align-items: center; }
        select { padding: 8px 12px; border-radius: 8px; border: 1px solid #d1d5db; font-weight: 600; }

        /* --- VISTE --- */
        .view { display: none; animation: fadeIn 0.4s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- GESTIONE FLUSSI MENSILI (LA TUA SEZIONE) --- */
        .flussi-panel {
            background: var(--white);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .flussi-panel h2 {
            margin-top: 0;
            font-weight: 800;
            font-size: 1.5rem;
            margin-bottom: 25px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        th {
            text-align: left;
            color: var(--text-muted);
            padding: 12px;
            border-bottom: 2px solid #f1f5f9;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #f8fafc;
        }

        .section-header-row {
            background: var(--section-header-bg);
            color: var(--section-header-text);
            font-weight: 800;
            font-size: 1.1rem;
        }

        .btn-add {
            background: #f1f5f9;
            border: 1px dashed #cbd5e1;
            color: #64748b;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            margin-bottom: 25px;
            transition: 0.3s;
        }
        .btn-add:hover { background: #e2e8f0; border-color: #94a3b8; }

        .btn-delete {
            color: var(--danger);
            background: none;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1rem;
            opacity: 0.3;
            transition: 0.3s;
        }
        tr:hover .btn-delete { opacity: 1; }

        .btn-save {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            float: right;
            transition: 0.3s;
        }
        .btn-save:hover { background: #1d4ed8; }

        .val-positive { color: var(--success); font-weight: bold; }
        .val-negative { color: var(--danger); font-weight: bold; }

    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <div class="logo">Bilancio App Pro</div>
        <nav>
            <button onclick="showPage('home')">Home</button>
            <button onclick="showPage('calendario')">Calendario</button>
            <button onclick="showPage('resoconto')">Resoconto Annuale</button>
            <button onclick="showPage('guadagni')" class="active">Guadagni e Spese</button>
        </nav>
        <div class="time-controls">
            <select id="selMese"><option>Marzo</option><option>Aprile</option></select>
            <select id="selAnno"><option>2026</option><option>2025</option></select>
        </div>
    </header>

    <div id="home" class="view"><div class="flussi-panel"><h1>Dashboard Home</h1></div></div>
    <div id="calendario" class="view"><div class="flussi-panel"><h1>Calendario</h1></div></div>
    <div id="resoconto" class="view"><div class="flussi-panel"><h1>Resoconto Annuale</h1></div></div>

    <div id="guadagni" class="view active">
        <div class="flussi-panel">
            <h2>Gestione Flussi Mensili</h2>
            
            <table>
                <thead>
                    <tr>
                        <th style="width: 25%;">Voce / Fase</th>
                        <th style="width: 30%;">Attività</th>
                        <th style="width: 20%;">Responsabile</th>
                        <th style="width: 20%;">Importo</th>
                        <th style="width: 5%;"></th>
                    </tr>
                </thead>
                <tbody id="lista-guadagni">
                    <tr class="section-header-row"><td colspan="5">Guadagni</td></tr>
                    <tr>
                        <td>Stipendio</td>
                        <td>Analisi Mensile</td>
                        <td>Mario</td>
                        <td class="val-positive">2.500 €</td>
                        <td><button class="btn-delete" onclick="deleteRow(this)">×</button></td>
                    </tr>
                </tbody>
            </table>
            <button class="btn-add" onclick="addRow('lista-guadagni', 'val-positive')">+ Aggiungi Voce Guadagno</button>

            <table>
                <tbody id="lista-spese">
                    <tr class="section-header-row"><td colspan="5">Spese</td></tr>
                    <tr>
                        <td>Affitto</td>
                        <td>Sviluppo Casa</td>
                        <td>Lucio</td>
                        <td class="val-negative">600 €</td>
                        <td><button class="btn-delete" onclick="deleteRow(this)">×</button></td>
                    </tr>
                </tbody>
            </table>
            <button class="btn-add" onclick="addRow('lista-spese', 'val-negative')">+ Aggiungi Voce Spesa</button>

            <button class="btn-save" onclick="saveAll()">Salva Tutto</button>
            <div style="clear: both;"></div>
        </div>
    </div>
</div>

<script>
    function showPage(pageId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function addRow(tbodyId, colorClass) {
        const tbody = document.getElementById(tbodyId);
        const row = document.createElement('tr');
        
        row.innerHTML = `
            <td contenteditable="true">Nuova Voce</td>
            <td contenteditable="true">Descrizione</td>
            <td contenteditable="true">Nome</td>
            <td contenteditable="true" class="${colorClass}">0 €</td>
            <td><button class="btn-delete" onclick="deleteRow(this)">×</button></td>
        `;
        tbody.appendChild(row);
    }

    function deleteRow(btn) {
        btn.closest('tr').remove();
    }

    function saveAll() {
        alert("Dati salvati con successo!");
        // Qui si potrebbe aggiungere la logica per inviare i dati a un server o salvarli localmente
    }
</script>

</body>
</html>
