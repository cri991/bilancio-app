<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilancio Personale - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-attivo { background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); }
        .bg-passivo { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
    </style>
</head>
<body class="bg-slate-50 pb-10">

    <div class="max-w-6xl mx-auto p-4 md:p-6 space-y-10">
        
        <section>
            <h2 class="text-xs font-black text-slate-400 uppercase tracking-[0.3em] mb-4 ml-2">Bilancio Reale (Saldato)</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <p class="text-xs font-bold text-slate-400 uppercase">Totale In Cassa</p>
                    <h3 id="reale-totale" class="text-3xl font-black text-slate-800 mt-1">€ 0,00</h3>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 border-l-4 border-l-emerald-500">
                    <p class="text-xs font-bold text-slate-400 uppercase">Entrate Effettive</p>
                    <h3 id="reale-entrate" class="text-2xl font-black text-emerald-600 mt-1">€ 0,00</h3>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 border-l-4 border-l-rose-500">
                    <p class="text-xs font-bold text-slate-400 uppercase">Uscite Effettive</p>
                    <h3 id="reale-uscite" class="text-2xl font-black text-rose-600 mt-1">€ 0,00</h3>
                </div>
            </div>
        </section>

        <hr class="border-slate-200">

        <section>
            <h2 class="text-xs font-black text-indigo-500 uppercase tracking-[0.3em] mb-4 ml-2">Analisi Strategica (Previsioni)</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-3xl shadow-md border border-indigo-50 relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-2 opacity-10 font-black text-4xl">IN</div>
                    <p class="text-xs font-bold text-slate-400 uppercase">Entrate Previste</p>
                    <h3 id="strat-entrate" class="text-3xl font-black text-indigo-600 mt-1">€ 0,00</h3>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-md border border-rose-50 relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-2 opacity-10 font-black text-4xl">OUT</div>
                    <p class="text-xs font-bold text-slate-400 uppercase">Uscite Pendenti</p>
                    <h3 id="strat-uscite" class="text-3xl font-black text-rose-500 mt-1">€ 0,00</h3>
                </div>
                <div id="strat-card-netto" class="p-6 rounded-3xl shadow-lg text-white transition-all duration-500">
                    <p id="strat-label-netto" class="text-xs font-bold opacity-80 uppercase tracking-widest">Saldo Futuro</p>
                    <h3 id="strat-netto" class="text-3xl font-black mt-1">€ 0,00</h3>
                </div>
            </div>
        </section>

        <section class="bg-slate-900 p-8 rounded-[2.5rem] shadow-2xl">
            <form id="form-movimento" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="desc" placeholder="Descrizione" class="p-4 rounded-2xl bg-slate-800 text-white border-none focus:ring-2 focus:ring-indigo-500 outline-none" required>
                <input type="number" id="valore" placeholder="Importo €" class="p-4 rounded-2xl bg-slate-800 text-white border-none focus:ring-2 focus:ring-indigo-500 outline-none font-bold" required>
                <div class="grid grid-cols-2 gap-2">
                    <select id="tipo" class="p-4 rounded-2xl bg-slate-800 text-white font-bold text-xs uppercase cursor-pointer">
                        <option value="entrata text-emerald-400">Entrata</option>
                        <option value="uscita text-rose-400">Uscita</option>
                    </select>
                    <select id="stato" class="p-4 rounded-2xl bg-slate-800 text-white font-bold text-xs uppercase cursor-pointer">
                        <option value="saldato">Già Saldato</option>
                        <option value="pendente">Pendente</option>
                    </select>
                </div>
                <button type="submit" class="bg-indigo-500 hover:bg-indigo-400 text-white font-black rounded-2xl p-4 transition-all uppercase text-sm">Registra</button>
            </form>
        </section>

        <section class="space-y-4">
            <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest ml-4">Cronologia Movimenti</h3>
            <div id="lista-container" class="space-y-3"></div>
        </section>

    </div>

    <script>
        let movimenti = JSON.parse(localStorage.getItem('movimenti')) || [];

        function render() {
            const container = document.getElementById('lista-container');
            container.innerHTML = '';

            // Calcoli Dashboard REALE
            let rEntrate = 0, rUscite = 0;
            // Calcoli Dashboard STRATEGICA
            let sEntrate = 0, sUscite = 0;

            movimenti.forEach((m, i) => {
                const val = Number(m.valore);
                
                if (m.stato === 'saldato') {
                    if (m.tipo === 'entrata') rEntrate += val; else rUscite += val;
                } else {
                    if (m.tipo === 'entrata') sEntrate += val; else sUscite += val;
                }

                const div = document.createElement('div');
                div.className = 'bg-white p-4 rounded-2xl border border-slate-100 flex justify-between items-center shadow-sm';
                div.innerHTML = `
                    <div class="flex items-center space-x-4">
                        <button onclick="toggle(${i})" class="w-10 h-10 rounded-full flex items-center justify-center ${m.stato === 'saldato' ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600 animate-pulse'}">
                            ${m.stato === 'saldato' ? '✓' : '⌛'}
                        </button>
                        <div>
                            <p class="font-bold text-slate-700 uppercase text-xs">${m.desc}</p>
                            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-tighter">${m.tipo} - ${m.stato}</p>
                        </div>
                    </div>
                    <div class="font-black ${m.tipo === 'entrata' ? 'text-emerald-500' : 'text-rose-500'}">
                        ${m.tipo === 'entrata' ? '+' : '-'} €${val.toLocaleString()}
                    </div>
                `;
                container.appendChild(div);
            });

            // Update UI Reale
            document.getElementById('reale-entrate').innerText = `€ ${rEntrate.toLocaleString()}`;
            document.getElementById('reale-uscite').innerText = `€ ${rUscite.toLocaleString()}`;
            document.getElementById('reale-totale').innerText = `€ ${(rEntrate - rUscite).toLocaleString()}`;

            // Update UI Strategica
            document.getElementById('strat-entrate').innerText = `€ ${sEntrate.toLocaleString()}`;
            document.getElementById('strat-uscite').innerText = `€ ${sUscite.toLocaleString()}`;
            const sNetto = sEntrate - sUscite;
            document.getElementById('strat-netto').innerText = `€ ${Math.abs(sNetto).toLocaleString()}`;
            
            const cardNetto = document.getElementById('strat-card-netto');
            const labelNetto = document.getElementById('strat-label-netto');
            if(sNetto >= 0) {
                cardNetto.className = "p-6 rounded-3xl shadow-lg text-white bg-attivo transition-all";
                labelNetto.innerText = "Saldo Futuro Attivo";
            } else {
                cardNetto.className = "p-6 rounded-3xl shadow-lg text-white bg-passivo transition-all";
                labelNetto.innerText = "Saldo Futuro Passivo";
            }

            localStorage.setItem('movimenti', JSON.stringify(movimenti));
        }

        document.getElementById('form-movimento').onsubmit = (e) => {
            e.preventDefault();
            movimenti.unshift({
                desc: document.getElementById('desc').value,
                valore: document.getElementById('valore').value,
                tipo: document.getElementById('tipo').value,
                stato: document.getElementById('stato').value
            });
            document.getElementById('form-movimento').reset();
            render();
        };

        window.toggle = (i) => {
            movimenti[i].stato = movimenti[i].stato === 'saldato' ? 'pendente' : 'saldato';
            render();
        };

        render();
    </script>
</body>
</html>
