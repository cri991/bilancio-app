<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilancioApp Pro - Gestione Dinamica</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f1f5f9;
            --white: #ffffff;
            --text-main: #1e293b;
            --teal-bg: #e0f2f1;
            --teal-text: #00796b;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); margin: 0; padding: 20px; color: var(--text-main); }

        .wrapper { max-width: 1200px; margin: auto; }
        
        header {
            background: var(--white);
            padding: 15px 25px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        nav button {
            border: none; background: none; padding: 10px 16px;
            border-radius: 10px; font-weight: 600; cursor: pointer;
            color: #64748b; transition: 0.3s;
        }
        nav button.active { background: var(--primary); color: white; }

        .view { display: none; animation: fadeIn 0.4s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- TABELLA GUADAGNI E SPESE --- */
        .table-panel { background: var(--white); border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        th { text-align: left; color: #64748b; padding: 12px; border-bottom: 2px solid #f1f5f9; }
        td { padding: 12px; border-bottom: 1px solid #f8fafc; }

        .section-header { background: var(--teal-bg); color: var(--teal-text); font-weight: 800; font-size: 1.1rem; }
        
        [contenteditable="true"] { 
            padding: 4px 8px;
            border-radius: 4px;
            outline: none;
            transition: 0.2s;
        }
        [contenteditable="true"]:focus { background: #eef2ff; box-shadow: 0 0 0 2px var(--primary); }

        .btn-add {
            background: #f1f5f9; border: 1px dashed #cbd5e1; color: #475569;
            padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600;
            width: 100%; margin-bottom: 25px; transition: 0.3s;
        }
        .btn-add:hover { background: #e2e8f0; border-color: #94a3b8; }

        .btn-delete {
            color: var(--danger); background: none; border: none; 
            font-weight: bold; cursor: pointer; font-size: 1.2rem;
            opacity: 0.3; transition: 0.3s;
        }
        tr:hover .btn-delete { opacity: 1; }

        .val-positive { color: var(--success); font-weight: bold; }
        .val-negative { color: var(--danger); font-weight: bold; }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <div style="font-weight: 800; font-size: 1.4rem; color: var(--primary);">BilancioApp Pro</div>
        <nav>
            <button onclick="showPage('home')">Home</button>
            <button onclick="showPage('guadagni')" class="active">Guadagni e Spese</button>
        </nav>
        <div style="display: flex; gap: 10px;">
            <select id="selMese"><option>Gennaio</option><option>Febbraio</option></select>
            <select id="selAnno"><option>2025</option><option>2026</option></select>
        </div>
    </header>

    <div id="home" class="view">
        <div class="table-panel"><h1>Dashboard Home</h1><p>Seleziona "Guadagni e Spese" per modificare i dati.</p></div>
    </div>

    <div id="guadagni" class="view active">
        <div class="table-panel">
            <h2>Gestione Flussi Mensili</h2>
            
            <table>
                <thead>
                    <tr>
                        <th style="width: 30%;">Voce / Fase</th>
                        <th style="width: 30%;">Attività</th>
                        <th style="width: 20%;">Responsabile</th>
                        <th style="width: 15%;">Importo</th>
                        <th style="width: 5%;"></th>
                    </tr>
                </thead>
                
                <tbody id="body-guadagni">
                    <tr class="section-header"><td colspan="5">Guadagni</td></tr>
                    <tr>
                        <td contenteditable="true">Stipendio</td>
                        <td contenteditable="true">Analisi Mensile</td>
                        <td contenteditable="true">Mario</td>
                        <td contenteditable="true" class="val-positive">2.500 €</td>
                        <td><button class="btn-delete" onclick="deleteRow(this)">×</button></td>
                    </tr>
                </tbody>
            </table>
            <button class="btn-add" onclick="addRow('body-guadagni', 'val-positive')">+ Aggiungi Voce Guadagno</button>

            <table>
                <tbody id="body-spese">
                    <tr class="section-header"><td colspan="5">Spese</td></tr>
                    <tr>
                        <td contenteditable="true">Affitto</td>
                        <td contenteditable="true">Sviluppo Casa</td>
                        <td contenteditable="true">Lucio</td>
                        <td contenteditable="true" class="val-negative">600 €</td>
                        <td><button class="btn-delete" onclick="deleteRow(this)">×</button></td>
                    </tr>
                </tbody>
            </table>
            <button class="btn-add" onclick="addRow('body-spese', 'val-negative')">+ Aggiungi Voce Spesa</button>
            
            <div style="text-align: right;">
                <button onclick="saveData()" style="padding: 12px 30px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold;">Salva Tutto</button>
            </div>
        </div>
    </div>
</div>

<script>
    function showPage(pageId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function addRow(containerId, colorClass) {
        const tbody = document.getElementById(containerId);
        const newRow = document.createElement('tr');
        
        const defaultSign = colorClass === 'val-negative' ? '-' : '';
        
        newRow.innerHTML = `
            <td contenteditable="true">Nuova Voce</td>
            <td contenteditable="true">Descrizione</td>
            <td contenteditable="true">Nome</td>
            <td contenteditable="true" class="${colorClass}">${defaultSign}0 €</td>
            <td><button class="btn-delete" onclick="deleteRow(this)">×</button></td>
        `;
        tbody.appendChild(newRow);
    }

    function deleteRow(btn) {
        if(confirm("Eliminare questa voce?")) {
            btn.closest('tr').remove();
        }
    }

    function saveData() {
        alert("Dati salvati e grafici della Home aggiornati!");
        // Qui si potrebbe aggiungere la logica per salvare su un database o LocalStorage
    }
</script>

</body>
</html>
