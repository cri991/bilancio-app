<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyFinance Desktop Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-user-select: none; }
        
        /* FIX SIDEBAR: Colore quando attivo */
        .sidebar-link.active { background: #4f46e5 !important; color: white !important; shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4); }
        
        /* FIX SEZIONI: Nascondi di default, mostra solo se .active */
        .content-section { display: none; }
        .content-section.active { display: block !important; animation: fadeIn 0.3s ease-in-out; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .calendar-day.selected { background: #4f46e5 !important; color: white !important; transform: scale(1.1); }
        .calendar-day.has-note::after { content: ''; display: block; width: 4px; height: 4px; background: #f43f5e; border-radius: 50%; margin: 2px auto 0; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden text-slate-900">

    <aside class="w-72 bg-white border-r border-slate-200 flex flex-col p-8 justify-between">
        <div class="space-y-10">
            <div class="flex items-center space-x-3">
                <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-lg"><i class="fas fa-vault fa-lg"></i></div>
                <span class="font-black text-2xl tracking-tighter uppercase italic">MyFinance</span>
            </div>
            <nav class="space-y-2">
                <button onclick="showSection('home')" id="btn-home" class="sidebar-link active w-full flex items-center space-x-4 p-4 rounded-2xl transition-all font-bold text-sm text-slate-500 hover:bg-slate-50"><i class="fas fa-home w-5"></i> <span>Dashboard Home</span></button>
                <button onclick="showSection('strategica')" id="btn-strategica" class="sidebar-link w-full flex items-center space-x-4 p-4 rounded-2xl transition-all font-bold text-sm text-slate-500 hover:bg-slate-50"><i class="fas fa-brain w-5"></i> <span>Analisi Strategica</span></button>
                <button onclick="showSection('spese')" id="btn-spese" class="sidebar-link w-full flex items-center space-x-4 p-4 rounded-2xl transition-all font-bold text-sm text-slate-500 hover:bg-slate-50"><i class="fas fa-receipt w-5"></i> <span>Spese Fisse</span></button>
                <button onclick="showSection('variabili')" id="btn-variabili" class="sidebar-link w-full flex items-center space-x-4 p-4 rounded-2xl transition-all font-bold text-sm text-slate-500 hover:bg-slate-50"><i class="fas fa-shopping-cart w-5"></i> <span>Spese Variabili</span></button>
                <button onclick="showSection('calendario')" id="btn-calendario" class="sidebar-link w-full flex items-center space-x-4 p-4 rounded-2xl transition-all font-bold text-sm text-slate-500 hover:bg-slate-50"><i class="fas fa-calendar-alt w-5"></i> <span>Calendario / Note</span></button>
            </nav>
        </div>
        <div class="space-y-2 pt-6 border-t border-slate-100">
            <button onclick="resetApp()" class="w-full text-left p-3 text-[10px] font-black uppercase text-rose-400 hover:bg-rose-50 rounded-xl transition-all tracking-widest"><i class="fas fa-power-off mr-2"></i> Reset App</button>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-12 bg-slate-50">
        
        <div id="home" class="content-section active space-y-10">
            <h2 class="text-4xl font-black tracking-tighter uppercase text-slate-800">Riepilogo Generale</h2>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 text-slate-800">
                <div class="bg-white p-10 rounded-[3rem] shadow-sm border border-slate-100"><span class="text-[10px] font-black text-slate-300 uppercase tracking-widest">Saldo Stimato</span><h3 id="h-totale" class="text-5xl font-black mt-2 tracking-tighter">€ 0,00</h3></div>
                <div class="bg-white p-8 rounded-[2.5rem] border-l-8 border-rose-500 shadow-sm"><p class="text-xs font-bold uppercase text-rose-500">Uscite Fisse</p><h4 id="h-entrate" class="text-3xl font-black mt-1">€ 0,00</h4></div>
                <div class="bg-white p-8 rounded-[2.5rem] border-l-8 border-orange-500 shadow-sm"><p class="text-xs font-bold uppercase text-orange-500">Uscite Variabili</p><h4 id="h-uscite" class="text-3xl font-black mt-1">€ 0,00</h4></div>
            </div>
        </div>

        <div id="strategica" class="content-section space-y-10">
            <h2 class="text-4xl font-black tracking-tighter uppercase text-indigo-600">Analisi Strategica</h2>
            <div class="bg-white p-10 rounded-[3rem] shadow-sm border border-slate-100"><p class="text-slate-400 font-bold uppercase text-xs">Nota</p><p class="text-lg font-medium">Qui puoi visualizzare l'impatto dei tuoi costi fissi sul budget annuale.</p></div>
        </div>

        <div id="spese" class="content-section space-y-10">
            <h2 class="text-4xl font-black tracking-tighter uppercase text-slate-800">Spese Fisse</h2>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                <div class="lg:col-span-1 bg-white p-8 rounded-[3rem] shadow-sm border border-slate-100 h-fit">
                    <div class="space-y-4">
                        <input type="text" id="fissa-nome" placeholder="Esempio: Netflix" class="w-full p-4 rounded-2xl bg-slate-50 border-none font-bold">
                        <input type="number" id="fissa-prezzo" placeholder="Prezzo €" class="w-full p-4 rounded-2xl bg-slate-50 border-none font-black text-lg">
                        <button onclick="addItem('fissa')" class="w-full bg-slate-900 text-white font-black p-5 rounded-2xl uppercase text-xs tracking-widest shadow-lg">Aggiungi Fissa</button>
                    </div>
                </div>
                <div class="lg:col-span-2 bg-white p-8 rounded-[3.5rem] shadow-sm border border-slate-100 min-h-[300px]">
                    <div id="lista-fisse" class="divide-y divide-slate-50"></div>
                    <div class="mt-8 pt-8 border-t-4 border-double border-slate-100 flex justify-between items-center px-4">
                        <span id="tot-fisse" class="text-4xl font-black text-indigo-600 italic">€ 0,00</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="variabili" class="content-section space-y-10">
            <h2 class="text-4xl font-black tracking-tighter uppercase text-slate-800">Spese Variabili</h2>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                <div class="lg:col-span-1 bg-white p-8 rounded-[3rem] shadow-sm border border-slate-100 h-fit">
                    <div class="space-y-4">
                        <input type="text" id="var-nome" placeholder="Esempio: Spesa" class="w-full p-4 rounded-2xl bg-slate-50 border-none font-bold">
                        <input type="number" id="var-prezzo" placeholder="Prezzo €" class="w-full p-4 rounded-2xl bg-slate-50 border-none font-black text-lg">
                        <button onclick="addItem('variabile')" class="w-full bg-indigo-600 text-white font-black p-5 rounded-2xl uppercase text-xs tracking-widest shadow-lg">Aggiungi Variabile</button>
                    </div>
                </div>
                <div class="lg:col-span-2 bg-white p-8 rounded-[3.5rem] shadow-sm border border-slate-100 min-h-[300px]">
                    <div id="lista-variabili" class="divide-y divide-slate-50"></div>
                    <div class="mt-8 pt-8 border-t-4 border-double border-slate-100 flex justify-between items-center px-4">
                        <span id="tot-variabili" class="text-4xl font-black text-emerald-500 italic">€ 0,00</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="calendario" class="content-section space-y-10">
            <div class="flex justify-between items-center">
                <h2 class="text-4xl font-black tracking-tighter uppercase">Calendario / Note</h2>
                <div class="flex bg-white p-2 rounded-2xl border border-slate-100 shadow-sm space-x-4 items-center">
                    <button onclick="changeMonth(-1)" class="w-10 h-10 rounded-xl hover:bg-slate-50 text-slate-400"><i class="fas fa-chevron-left"></i></button>
                    <span id="monthTitle" class="font-black text-sm uppercase tracking-widest w-44 text-center"></span>
                    <button onclick="changeMonth(1)" class="w-10 h-10 rounded-xl hover:bg-slate-50 text-slate-400"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                <div class="bg-white p-8 rounded-[3rem] shadow-sm border border-slate-100"><div id="calendar-grid" class="grid grid-cols-7 gap-4"></div></div>
                <div class="space-y-6">
                    <div id="selectedDateLabel" class="text-[10px] font-black text-indigo-500 uppercase tracking-widest ml-4 bg-indigo-50 px-4 py-1 rounded-full w-fit">Seleziona un giorno</div>
                    <div class="bg-white p-8 rounded-[3rem] shadow-xl border border-indigo-50">
                        <input type="text" id="memoText" placeholder="Scrivi nota..." class="w-full p-4 rounded-2xl bg-slate-50 border-none font-bold mb-4">
                        <button onclick="addMemo()" class="w-full bg-slate-900 text-white font-black p-4 rounded-2xl uppercase text-[10px]">Salva Nota</button>
                        <div id="memoList" class="mt-6 space-y-2"></div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        let fisse = JSON.parse(localStorage.getItem('myFinFisse')) || [];
        let variabili = JSON.parse(localStorage.getItem('myFinVariabili')) || [];
        let notes = JSON.parse(localStorage.getItem('myFinNotes')) || {};
        let currentViewDate = new Date();
        let selectedDayKey = null;

        // FUNZIONE SIDEBAR (FIXED)
        function showSection(id) {
            // Nasconde tutte le sezioni e toglie active dai bottoni
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
            
            // Attiva la sezione e il bottone cliccato
            const targetSection = document.getElementById(id);
            const targetBtn = document.getElementById('btn-' + id);
            
            if(targetSection) targetSection.classList.add('active');
            if(targetBtn) targetBtn.classList.add('active');

            if(id === 'calendario') initCalendar();
            render();
        }

        function addItem(tipo) {
            if(tipo === 'fissa') {
                const n = document.getElementById('fissa-nome').value;
                const p = document.getElementById('fissa-prezzo').value;
                if(n && p) { fisse.push({nome: n, prezzo: p}); document.getElementById('fissa-nome').value=''; document.getElementById('fissa-prezzo').value=''; }
            } else {
                const n = document.getElementById('var-nome').value;
                const p = document.getElementById('var-prezzo').value;
                if(n && p) { variabili.push({nome: n, prezzo: p}); document.getElementById('var-nome').value=''; document.getElementById('var-prezzo').value=''; }
            }
            render();
        }

        function delItem(tipo, i) {
            if(tipo === 'fissa') fisse.splice(i, 1);
            else variabili.splice(i, 1);
            render();
        }

        function render() {
            // Render Fisse
            const fList = document.getElementById('lista-fisse');
            fList.innerHTML = ''; let totF = 0;
            fisse.forEach((s, i) => {
                totF += parseFloat(s.prezzo);
                fList.innerHTML += `<div class="flex justify-between items-center py-4"><span class="text-xs font-black uppercase text-slate-800">${s.nome}</span><div class="flex items-center space-x-4"><span class="font-black italic">€ ${parseFloat(s.prezzo).toLocaleString('it-IT')}</span><button onclick="delItem('fissa', ${i})" class="text-slate-300 hover:text-rose-500"><i class="fas fa-times-circle"></i></button></div></div>`;
            });
            document.getElementById('tot-fisse').innerText = `€ ${totF.toLocaleString('it-IT')}`;

            // Render Variabili
            const vList = document.getElementById('lista-variabili');
            vList.innerHTML = ''; let totV = 0;
            variabili.forEach((s, i) => {
                totV += parseFloat(s.prezzo);
                vList.innerHTML += `<div class="flex justify-between items-center py-4"><span class="text-xs font-black uppercase text-slate-800">${s.nome}</span><div class="flex items-center space-x-4"><span class="font-black italic text-emerald-600">€ ${parseFloat(s.prezzo).toLocaleString('it-IT')}</span><button onclick="delItem('variabile', ${i})" class="text-slate-300 hover:text-rose-500"><i class="fas fa-times-circle"></i></button></div></div>`;
            });
            document.getElementById('tot-variabili').innerText = `€ ${totV.toLocaleString('it-IT')}`;

            // Totali Dashboard
            document.getElementById('h-entrate').innerText = `€ ${totF.toLocaleString('it-IT')}`;
            document.getElementById('h-uscite').innerText = `€ ${totV.toLocaleString('it-IT')}`;
            document.getElementById('h-totale').innerText = `€ -${(totF + totV).toLocaleString('it-IT')}`;

            localStorage.setItem('myFinFisse', JSON.stringify(fisse));
            localStorage.setItem('myFinVariabili', JSON.stringify(variabili));
            localStorage.setItem('myFinNotes', JSON.stringify(notes));
            renderNotes();
        }

        // CALENDARIO
        function initCalendar() {
            const grid = document.getElementById('calendar-grid');
            const y = currentViewDate.getFullYear(); const m = currentViewDate.getMonth();
            document.getElementById('monthTitle').innerText = new Intl.DateTimeFormat('it-IT', { month: 'long', year: 'numeric' }).format(currentViewDate);
            grid.innerHTML = '';
            const first = new Date(y, m, 1).getDay() || 7;
            const last = new Date(y, m + 1, 0).getDate();
            for(let i = 1; i < first; i++) grid.innerHTML += `<div></div>`;
            for(let d = 1; d <= last; d++) {
                const dayKey = `${d}-${m}-${y}`;
                const hasNote = notes[dayKey] && notes[dayKey].length > 0 ? 'has-note' : '';
                grid.innerHTML += `<div onclick="selectDay(${d}, ${m}, ${y})" class="calendar-day p-4 rounded-2xl text-[10px] font-black bg-slate-50 text-slate-400 text-center cursor-pointer hover:bg-indigo-50 ${selectedDayKey === dayKey ? 'selected' : ''} ${hasNote}">${d}</div>`;
            }
        }
        function changeMonth(s) { currentViewDate.setMonth(currentViewDate.getMonth() + s); initCalendar(); }
        function selectDay(d, m, y) { selectedDayKey = `${d}-${m}-${y}`; document.getElementById('selectedDateLabel').innerText = `${d}/${m+1}/${y}`; initCalendar(); renderNotes(); }
        function addMemo() { const t = document.getElementById('memoText').value; if(t && selectedDayKey) { if(!notes[selectedDayKey]) notes[selectedDayKey] = []; notes[selectedDayKey].push(t); document.getElementById('memoText').value=''; render(); initCalendar(); } }
        function renderNotes() { const l = document.getElementById('memoList'); if(!l) return; l.innerHTML=''; if(selectedDayKey && notes[selectedDayKey]) { notes[selectedDayKey].forEach(n => { l.innerHTML += `<div class="bg-slate-100 p-3 rounded-xl text-[10px] font-bold uppercase tracking-widest">${n}</div>`; }); } }
        
        function resetApp() { if(confirm("Cancellare tutti i dati?")) { localStorage.clear(); location.reload(); } }

        // Avvio iniziale
        render();
    </script>
</body>
</html>
