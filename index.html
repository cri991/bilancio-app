<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bilancio Mensile</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
margin:0;
font-family:-apple-system;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
}

/* GLASS */
.card {
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border-radius:20px;
padding:15px;
margin:10px;
}

/* HEADER */
.header {
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
}

button {
border:none;
border-radius:10px;
padding:8px 12px;
}

/* CARDS */
.grid {
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.box {
padding:15px;
border-radius:15px;
text-align:center;
font-weight:bold;
}

.green{background:#2ecc71;}
.red{background:#e74c3c;}
.blue{background:#3498db;}
.purple{background:#9b59b6;}

/* INPUT */
input {
width:100%;
padding:8px;
margin:5px 0;
border-radius:8px;
border:none;
}

/* LOCK */
#lockScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0f172a;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}
</style>
</head>

<body>

<!-- 🔐 LOCK -->
<div id="lockScreen">
<h2>🔐 Accesso</h2>
<input type="password" id="password">
<button onclick="login()">Accedi</button>
</div>

<!-- HEADER -->
<div class="header">
<h2>💎 Bilancio</h2>
<button onclick="logout()">Logout</button>
</div>

<!-- MESE -->
<div style="text-align:center;">
<button onclick="prevMonth()">◀</button>
<span id="mese"></span>
<button onclick="nextMonth()">▶</button>
</div>

<!-- CARDS -->
<div class="grid">
<div class="box green">Reddito<br><span id="totEntrate">0</span></div>
<div class="box red">Spese<br><span id="totSpese">0</span></div>
<div class="box blue">Risparmio<br><span id="risparmio">0</span></div>
<div class="box purple">Margine<br><span id="margine">0%</span></div>
</div>

<!-- INPUT -->
<div class="card">
<h3>Entrate</h3>
<input id="stipendio" placeholder="Stipendio">
<input id="extra" placeholder="Extra">
</div>

<div class="card">
<h3>Spese</h3>
<input id="affitto" placeholder="Affitto">
<input id="bollette" placeholder="Bollette">
<input id="spesa" placeholder="Spesa">
</div>

<!-- GRAFICO -->
<div class="card">
<canvas id="grafico"></canvas>
</div>

<!-- CALENDARIO -->
<div class="card">
<h3>📅 Promemoria</h3>
<input type="date" id="data">
<input id="testo" placeholder="Scrivi spesa">
<button onclick="aggiungi()">Aggiungi</button>
<ul id="lista"></ul>
</div>

<script>

// PASSWORD
const PASSWORD="1234";

// LOGIN
function login(){
if(document.getElementById("password").value===PASSWORD){
document.getElementById("lockScreen").style.display="none";
localStorage.setItem("login","ok");
}
}

function logout(){
location.reload();
}

// AUTO LOGIN
if(localStorage.getItem("login")==="ok"){
document.getElementById("lockScreen").style.display="none";
}

// MESE
let m=new Date().getMonth();
let a=new Date().getFullYear();
const mesi=["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"];

function aggiorna(){
document.getElementById("mese").innerText=mesi[m]+" "+a;
carica();
caricaLista();
}

function nextMonth(){m++;if(m>11){m=0;a++}aggiorna();}
function prevMonth(){m--;if(m<0){m=11;a--}aggiorna();}

// CALCOLO
function calcola(){
let e=(+stipendio.value||0)+(+extra.value||0);
let s=(+affitto.value||0)+(+bollette.value||0)+(+spesa.value||0);

totEntrate.innerText=e;
totSpese.innerText=s;
risparmio.innerText=e-s;
margine.innerText=(e?((e-s)/e*100).toFixed(1):0)+"%";

salva();
grafico(e,s);
}

// SALVA
function salva(){
let dati={
stipendio:stipendio.value,
extra:extra.value,
affitto:affitto.value,
bollette:bollette.value,
spesa:spesa.value
};
localStorage.setItem("dati"+m+a,JSON.stringify(dati));
}

// CARICA
function carica(){
let d=JSON.parse(localStorage.getItem("dati"+m+a))||{};
stipendio.value=d.stipendio||"";
extra.value=d.extra||"";
affitto.value=d.affitto||"";
bollette.value=d.bollette||"";
spesa.value=d.spesa||"";
calcola();
}

// GRAFICO
let chart;
function grafico(e,s){
if(chart)chart.destroy();
chart=new Chart(grafico,{
type:'doughnut',
data:{
labels:["Entrate","Spese"],
datasets:[{data:[e,s]}]
}
});
}

// EVENTI
document.querySelectorAll("input").forEach(i=>i.oninput=calcola);

// CALENDARIO
function aggiungi(){
let arr=JSON.parse(localStorage.getItem("sp"+m+a))||[];
arr.push(data.value+" - "+testo.value);
localStorage.setItem("sp"+m+a,JSON.stringify(arr));
caricaLista();
}

function caricaLista(){
let arr=JSON.parse(localStorage.getItem("sp"+m+a))||[];
lista.innerHTML="";
arr.forEach(e=>{
let li=document.createElement("li");
li.innerText=e;
lista.appendChild(li);
});
}

// SWIPE
let startX=0;
document.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
document.addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX;
if(startX-endX>50)nextMonth();
if(endX-startX>50)prevMonth();
});

aggiorna();

</script>

</body>
</html>
