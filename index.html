<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MyFinance Pro - GitHub Edition</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        :root { --primary: #4f46e5; --dark: #0f172a; }
        body { font-family: 'Inter', sans-serif; -webkit-user-select: none; touch-action: manipulation; background-color: #f8fafc; }
        #app-container { display: flex; height: 100vh; width: 100%; overflow: hidden; }
        
        @media (max-width: 1024px) {
            aside { position: fixed; top: 0; left: -100%; width: 85% !important; height: 100vh; z-index: 999; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); background: white; }
            aside.mobile-open { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.2); }
            #mobile-menu-trigger { display: flex !important; }
        }

        .sidebar-link.active { background: var(--primary) !important; color: white !important; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3); }
        .content-section { display: none; }
        .content-section.active { display: block !important; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .day-box { transition: all 0.2s; border: 1px solid #e2e8f0; aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; cursor: pointer; background: white; }
        .day-box.selected { border: 2px solid var(--primary); background-color: #eff6ff; }
        .has-hours { border-bottom: 4px solid #10b981; }
        .has-note::after { content: ''; width: 6px; height: 6px; background: #f43f5e; border-radius: 50%; margin-top: 2px; }
    </style>
</head>
<body>

    <button id="mobile-menu-trigger" onclick="toggleSidebar()" class="fixed bottom-6 right-6 w-16 h-16 bg-indigo-600 text-white rounded-full hidden items-center justify-center z-[1000] shadow-2xl active:scale-90 transition-transform">
        <i class="fas fa-bars text-xl"></i>
    </button>

    <div id="app-container">
        <aside id="sidebar" class="w-72 border-r border-slate-200 flex flex-col p-8 justify-between shrink-0">
            <div class="space-y-10">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg"><i class="fas fa-gem"></i></div>
                    <span class="font-black text-2xl tracking-tighter uppercase italic">MyFinance</span>
                </div>
                <nav class="space-y-2 text-slate-500 font-bold text-sm">
                    <button onclick="showSection('home')" id="btn-home" class="sidebar-link active w-full flex items-center space-x-4 p-4 rounded-2xl transition-all"><i class="fas fa-th-large w-5"></i> <span>Dashboard</span></button>
                    <button onclick="showSection('lavoro')" id="btn-lavoro" class="sidebar-link w-full flex items-center space-x-4 p-4 rounded-2xl transition-all"><i class="fas fa-clock w-5"></i> <span>Ore Lavoro</span></button>
                    <button onclick="showSection('spese')" id="btn-spese" class="sidebar-link w-full flex items-center space-x-4 p-4 rounded-2xl transition-all"><i class="fas fa-file-invoice w-5"></i> <span>Spese Fisse</span></button>
                    <button onclick="showSection('variabili')" id="btn-variabili" class="sidebar-link w-full flex items-center space-x-4 p-4 rounded-2xl transition-all"><i class="fas fa-shopping-cart w-5"></i> <span>Variabili</span></button>
                    <button onclick="showSection('note')" id="btn-note" class="sidebar-link w-full flex items-center space-x-4 p-4 rounded-2xl transition-all"><i class="fas fa-sticky-note w-5"></i> <span>Note & Memo</span></button>
                </nav>
            </div>

            <div class="pt-6 border-t border-slate-100 space-y-2">
                <input type="file" id="fileInput" class="hidden" onchange="importJSON(event)" accept=".json">
                <button onclick="document.getElementById('fileInput').click()" class="w-full text-left p-3 text-[10px] font-black uppercase text-emerald-600 hover:bg-emerald-50 rounded-xl">📂 Apri Backup</button>
                <button onclick="exportJSON()" class="w-full text-left p-3 text-[10px] font-black uppercase text-indigo-600 hover:bg-indigo-50 rounded-xl">💾 Salva Backup</button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-6 md:p-12">
            
            <div id="home" class="content-section active space-y-8">
                <h2 class="text-4xl font-black tracking-tighter uppercase italic text-slate-800">Dashboard</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-slate-900 p-8 rounded-[2.5rem] text-white shadow-xl">
                        <p class="text-[10px] font-black uppercase opacity-40 mb-2">Anno <span id="dash-year"></span></p>
                        <h3 id="dash-tot-anno" class="text-5xl font-black italic text-indigo-400">€ 0,00</h3>
                    </div>
                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-200 border-l-8 border-l-indigo-600 shadow-sm">
                        <p class="text-[10px] font-black uppercase text-slate-400 mb-2">Entrate Mese</p>
                        <h3 id="dash-tot-mese" class="text-4xl font-black text-slate-800">€ 0,00</h3>
                    </div>
                </div>
                <div class="flex justify-center bg-white p-8 rounded-[3rem] border shadow-sm max-w-sm mx-auto">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>

            <div id="lavoro" class="content-section space-y-8">
                <div class="flex justify-between items-center">
                    <h2 class="text-4xl font-black tracking-tighter uppercase italic">Ore Lavoro</h2>
                    <input type="number" id="pagaOraria" value="10" onchange="updatePaga()" class="w-16 bg-white p-2 border rounded-xl font-black text-indigo-600 text-center">
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2 bg-white p-6 rounded-[3rem] border shadow-sm">
                        <div class="flex justify-between items-center mb-6">
                            <button onclick="changeMonth(-1, 'work')" class="p-2">←</button>
                            <span id="workMonthTitle" class="font-black uppercase text-sm"></span>
                            <button onclick="changeMonth(1, 'work')" class="p-2">→</button>
                        </div>
                        <div id="work-grid" class="grid grid-cols-7 gap-2"></div>
                    </div>
                    <div class="bg-slate-900 p-8 rounded-[3rem] text-white h-fit shadow-xl">
                        <h4 id="selectedWorkDate" class="text-center font-black mb-6 text-indigo-400">Seleziona Data</h4>
                        <div class="grid grid-cols-2 gap-4 mb-4">
                            <input type="time" id="oraInizio" class="w-full bg-white/10 p-4 rounded-2xl font-black text-center text-white outline-none">
                            <input type="time" id="oraFine" class="w-full bg-white/10 p-4 rounded-2xl font-black text-center text-white outline-none">
                        </div>
                        <button onclick="saveHours()" class="w-full bg-indigo-600 p-5 rounded-2xl font-black uppercase text-xs hover:bg-indigo-500">Salva Turno</button>
                    </div>
                </div>
            </div>

            <div id="spese" class="content-section space-y-6">
                <h2 class="text-4xl font-black tracking-tighter uppercase italic">Spese Fisse</h2>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="bg-white p-8 rounded-[2.5rem] border h-fit shadow-sm">
                        <input type="text" id="fissa-nome" placeholder="Esempio: Affitto" class="w-full p-4 bg-slate-50 rounded-xl mb-3 font-bold outline-none">
                        <input type="number" id="fissa-prezzo" placeholder="Prezzo €" class="w-full p-4 bg-slate-50 rounded-xl mb-6 font-black outline-none">
                        <button onclick="addEntry('fissa')" class="w-full bg-slate-900 text-white p-4 rounded-xl font-black uppercase text-xs">Aggiungi</button>
                    </div>
                    <div id="list-fisse" class="space-y-2"></div>
                </div>
            </div>

            <div id="variabili" class="content-section space-y-6">
                <h2 class="text-4xl font-black tracking-tighter uppercase italic text-amber-600">Spese Variabili</h2>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="bg-white p-8 rounded-[2.5rem] border border-amber-100 h-fit shadow-sm">
                        <input type="text" id="var-nome" placeholder="Cosa hai comprato?" class="w-full p-4 bg-slate-50 rounded-xl mb-3 font-bold outline-none">
                        <input type="number" id="var-prezzo" placeholder="Prezzo €" class="w-full p-4 bg-slate-50 rounded-xl mb-6 font-black outline-none">
                        <button onclick="addEntry('variabile')" class="w-full bg-amber-600 text-white p-4 rounded-xl font-black uppercase text-xs shadow-lg">Aggiungi Spesa</button>
                    </div>
                    <div id="list-variabili" class="space-y-2"></div>
                </div>
            </div>

            <div id="note" class="content-section space-y-8">
                <h2 class="text-4xl font-black tracking-tighter uppercase italic">Note & Memo</h2>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2 bg-white p-8 rounded-[3rem] border shadow-sm">
                        <div class="flex justify-between items-center mb-6">
                            <button onclick="changeMonth(-1, 'note')" class="p-2">←</button>
                            <span id="noteMonthTitle" class="font-black uppercase text-sm"></span>
                            <button onclick="changeMonth(1, 'note')" class="p-2">→</button>
                        </div>
                        <div id="note-grid" class="grid grid-cols-7 gap-2"></div>
                    </div>
                    <div class="bg-white p-8 rounded-[3rem] border shadow-xl h-fit">
                        <h4 id="selectedNoteDate" class="font-black mb-4 text-indigo-600 border-b pb-2">Seleziona Giorno</h4>
                        <textarea id="noteText" placeholder="Scrivi qui..." class="w-full p-4 bg-slate-50 rounded-2xl mb-4 font-bold outline-none h-32"></textarea>
                        <button onclick="saveNote()" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black uppercase text-xs">Salva Nota</button>
                        <div id="dayNotesList" class="mt-6 space-y-2"></div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script>
        let db = {
            work: JSON.parse(localStorage.getItem('myFinWork')) || {},
            notes: JSON.parse(localStorage.getItem('myFinNotes')) || {},
            fisse: JSON.parse(localStorage.getItem('myFinFisse')) || [],
            variabili: JSON.parse(localStorage.getItem('myFinVariabili')) || [],
            paga: localStorage.getItem('myFinPaga') || 10
        };

        let currentWorkDate = new Date();
        let currentNoteDate = new Date();
        let selectedWorkKey = null;
        let selectedNoteKey = null;
        let myChart = null;

        function showSection(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
            if(id === 'home') renderDashboard();
            if(id === 'lavoro') renderCalendar('work');
            if(id === 'note') renderCalendar('note');
            if(id === 'spese' || id === 'variabili') renderLists();
            if(window.innerWidth < 1024) toggleSidebar();
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('mobile-open'); }

        // CORRETTA FUNZIONE AGGIUNGI
        function addEntry(type) {
            const prefix = type === 'fissa' ? 'fissa' : 'var';
            const nameField = document.getElementById(prefix + '-nome');
            const priceField = document.getElementById(prefix + '-prezzo');
            
            const n = nameField.value;
            const p = priceField.value;

            if (n && p) {
                const target = type === 'fissa' ? 'fisse' : 'variabili';
                db[target].push({ nome: n, prezzo: parseFloat(p) });
                nameField.value = '';
                priceField.value = '';
                saveAll(); renderLists(); renderDashboard();
            } else {
                alert("Compila entrambi i campi!");
            }
        }

        function renderLists() {
            // Fisse
            const lf = document.getElementById('list-fisse'); 
            if(lf) {
                lf.innerHTML = '';
                db.fisse.forEach((item, i) => {
                    lf.innerHTML += `<div class="bg-white p-4 rounded-xl flex justify-between border shadow-sm"><b>${item.nome}</b> <span>€ ${item.prezzo.toFixed(2)} <button onclick="deleteEntry('fissa', ${i})" class="ml-2 text-rose-500">×</button></span></div>`;
                });
            }
            // Variabili
            const lv = document.getElementById('list-variabili'); 
            if(lv) {
                lv.innerHTML = '';
                db.variabili.forEach((item, i) => {
                    lv.innerHTML += `<div class="bg-white p-4 rounded-xl flex justify-between border border-amber-100 shadow-sm"><b>${item.nome}</b> <span>€ ${item.prezzo.toFixed(2)} <button onclick="deleteEntry('variabile', ${i})" class="ml-2 text-rose-500">×</button></span></div>`;
                });
            }
        }

        function deleteEntry(type, i) {
            const target = type === 'fissa' ? 'fisse' : 'variabili';
            db[target].splice(i, 1);
            saveAll(); renderLists(); renderDashboard();
        }

        function renderCalendar(type) {
            const date = type === 'work' ? currentWorkDate : currentNoteDate;
            const grid = document.getElementById(type + '-grid');
            const title = document.getElementById(type + 'MonthTitle');
            const y = date.getFullYear();
            const m = date.getMonth();

            title.innerText = new Intl.DateTimeFormat('it-IT', {month:'long', year:'numeric'}).format(date);
            grid.innerHTML = '';
            const firstDay = new Date(y, m, 1).getDay() || 7;
            const daysInMonth = new Date(y, m + 1, 0).getDate();

            for(let i = 1; i < firstDay; i++) grid.innerHTML += '<div></div>';
            for(let d = 1; d <= daysInMonth; d++) {
                const key = `${d}-${m}-${y}`;
                const isSelected = (type === 'work' ? selectedWorkKey : selectedNoteKey) === key;
                const hasData = type === 'work' ? (db.work[key] ? 'has-hours' : '') : (db.notes[key] ? 'has-note' : '');
                grid.innerHTML += `<div onclick="selectDay(${d},${m},${y},'${type}')" class="day-box ${isSelected ? 'selected' : ''} ${hasData}"><span class="text-[10px] font-black text-slate-300">${d}</span>${type === 'work' && db.work[key] ? `<span class="text-[10px] font-black text-indigo-600">${db.work[key]}h</span>` : ''}</div>`;
            }
        }

        function selectDay(d, m, y, type) {
            const key = `${d}-${m}-${y}`;
            if(type === 'work') {
                selectedWorkKey = key;
                document.getElementById('selectedWorkDate').innerText = `${d}/${m+1}/${y}`;
            } else {
                selectedNoteKey = key;
                document.getElementById('selectedNoteDate').innerText = `${d}/${m+1}/${y}`;
                renderDayNotes();
            }
            renderCalendar(type);
        }

        function saveHours() {
            if(!selectedWorkKey) return alert("Scegli un giorno!");
            const s = document.getElementById('oraInizio').value;
            const e = document.getElementById('oraFine').value;
            if(!s || !e) delete db.work[selectedWorkKey];
            else {
                const [h1, m1] = s.split(':').map(Number);
                const [h2, m2] = e.split(':').map(Number);
                let diff = (h2 * 60 + m2) - (h1 * 60 + m1);
                if(diff < 0) diff += 1440;
                db.work[selectedWorkKey] = (diff/60).toFixed(2);
            }
            saveAll(); renderCalendar('work'); renderDashboard();
        }

        function saveNote() {
            const txt = document.getElementById('noteText').value;
            if(!selectedNoteKey || !txt) return;
            if(!db.notes[selectedNoteKey]) db.notes[selectedNoteKey] = [];
            db.notes[selectedNoteKey].push(txt);
            document.getElementById('noteText').value = '';
            saveAll(); renderDayNotes(); renderCalendar('note');
        }

        function renderDayNotes() {
            const list = document.getElementById('dayNotesList');
            list.innerHTML = '';
            if(db.notes[selectedNoteKey]) {
                db.notes[selectedNoteKey].forEach((n, i) => {
                    list.innerHTML += `<div class="bg-slate-50 p-3 rounded-xl flex justify-between text-sm"><span>${n}</span><button onclick="deleteNote(${i})" class="text-rose-400">×</button></div>`;
                });
            }
        }

        function deleteNote(i) {
            db.notes[selectedNoteKey].splice(i, 1);
            if(db.notes[selectedNoteKey].length === 0) delete db.notes[selectedNoteKey];
            saveAll(); renderDayNotes(); renderCalendar('note');
        }

        function renderDashboard() {
            const now = new Date();
            const m = now.getMonth(); const y = now.getFullYear();
            document.getElementById('dash-year').innerText = y;
            let entrateMese = 0; let totAnno = 0;
            for(let k in db.work) {
                const [kd, km, ky] = k.split('-').map(Number);
                const v = parseFloat(db.work[k]) * db.paga;
                if(ky === y) totAnno += v;
                if(ky === y && km === m) entrateMese += v;
            }
            let totFisse = db.fisse.reduce((a, b) => a + parseFloat(b.prezzo), 0);
            let totVar = db.variabili.reduce((a, b) => a + parseFloat(b.prezzo), 0);
            document.getElementById('dash-tot-mese').innerText = `€ ${entrateMese.toFixed(2)}`;
            document.getElementById('dash-tot-anno').innerText = `€ ${totAnno.toFixed(2)}`;
            
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: { datasets: [{ data: [entrateMese, totFisse + totVar], backgroundColor: ['#4f46e5', '#f1f5f9'] }] },
                options: { cutout: '80%' }
            });
        }

        function saveAll() {
            localStorage.setItem('myFinWork', JSON.stringify(db.work));
            localStorage.setItem('myFinNotes', JSON.stringify(db.notes));
            localStorage.setItem('myFinFisse', JSON.stringify(db.fisse));
            localStorage.setItem('myFinVariabili', JSON.stringify(db.variabili));
            localStorage.setItem('myFinPaga', db.paga);
        }

        function exportJSON() {
            const blob = new Blob([JSON.stringify(db)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `MyFinance_Backup.json`;
            a.click();
        }

        function importJSON(e) {
            const reader = new FileReader();
            reader.onload = (ev) => { db = JSON.parse(ev.target.result); saveAll(); location.reload(); };
            reader.readAsText(e.target.files[0]);
        }

        function changeMonth(dir, type) {
            const d = type === 'work' ? currentWorkDate : currentNoteDate;
            d.setMonth(d.getMonth() + dir);
            renderCalendar(type);
        }

        function updatePaga() { db.paga = document.getElementById('pagaOraria').value; saveAll(); renderDashboard(); }

        document.getElementById('pagaOraria').value = db.paga;
        renderDashboard();
    </script>
</body>
</html>
