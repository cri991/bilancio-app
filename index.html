<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilancio App - Dashboard Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f4f7f6;
            --sidebar-color: #ffffff;
            --primary-blue: #3498db;
            --income-green: #2ecc71;
            --expense-red: #e74c3c;
            --text-dark: #2c3e50;
            --shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-dark);
        }

        /* --- SIDEBAR SINISTRA --- */
        .sidebar {
            width: 80px;
            background-color: var(--sidebar-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            z-index: 100;
        }

        .sidebar-item {
            margin: 20px 0;
            cursor: pointer;
            transition: transform 0.2s;
            text-align: center;
        }

        .sidebar-item:hover { transform: scale(1.1); }

        /* Icone personalizzate richieste */
        .icon-wallet { color: #3498db; font-size: 28px; } /* Foto 1 */
        .icon-cal { color: #3498db; font-size: 28px; }    /* Foto 2 */
        .icon-stats { color: #1abc9c; font-size: 28px; }  /* Foto 3 */

        .bottom-actions { margin-top: auto; padding-bottom: 20px; }

        /* --- MAIN CONTENT --- */
        .main-content {
            flex-grow: 1;
            display: grid;
            grid-template-columns: 350px 1fr;
            grid-template-rows: 1fr auto;
            gap: 20px;
            padding: 25px;
            overflow-y: auto;
        }

        .card {
            background: #fff;
            border-radius: 15px;
            padding: 20px;
            box-shadow: var(--shadow);
        }

        /* Sezione Sinistra: Guadagni e Spese */
        .financial-summary {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .stat-box h2 { margin: 0; font-size: 14px; color: #7f8c8d; }
        .stat-box p { margin: 5px 0; font-size: 28px; font-weight: bold; }
        .income { color: var(--income-green); }
        .expense { color: var(--expense-red); }
        .net { color: var(--text-dark); border-top: 1px solid #eee; pt: 10px; }

        /* Grafico Linee */
        .chart-container {
            height: 250px;
            display: flex;
            align-items: flex-end;
            gap: 10px;
            padding-top: 20px;
        }

        /* Calendario Centrale */
        .calendar-container {
            grid-column: 2;
            grid-row: 1 / 3;
            display: flex;
            flex-direction: column;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            flex-grow: 1;
        }

        .day {
            border: 1px solid #f0f0f0;
            border-radius: 8px;
            min-height: 80px;
            padding: 5px;
            background: #fff;
        }

        /* Promemoria Colorati */
        .event {
            font-size: 10px;
            padding: 3px;
            border-radius: 4px;
            margin-top: 2px;
            color: #fff;
        }
        .event-blue { background: #3498db; }
        .event-red { background: #e74c3c; }
        .event-green { background: #2ecc71; }

    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-item"><i class="fas fa-home" style="color:#ddd"></i></div>
        <div class="sidebar-item" title="Calendario"><i class="fas fa-calendar-alt icon-cal"></i></div>
        <div class="sidebar-item" title="Resoconto Annuale"><i class="fas fa-chart-bar icon-stats"></i></div>
        <div class="sidebar-item" title="Guadagni e Spese"><i class="fas fa-wallet icon-wallet"></i></div>
        
        <div class="bottom-actions">
            <div class="sidebar-item"><i class="fas fa-moon"></i></div>
            <div class="sidebar-item"><i class="fas fa-sign-out-alt"></i></div>
        </div>
    </nav>

    <main class="main-content">
        
        <section class="financial-summary">
            <div class="card stat-box">
                <h2>Guadagni Totali</h2>
                <p class="income">€ 4.250,00</p>
                
                <h2>Spese Totali</h2>
                <p class="expense">€ 3.110,00</p>
                
                <div class="net">
                    <h2>Totale Netto</h2>
                    <p>€ 1.140,00</p>
                </div>
            </div>

            <div class="card">
                <h3>Andamento Spese/Guadagni</h3>
                <div style="height: 150px; width: 100%; border-left: 2px solid #eee; border-bottom: 2px solid #eee; position: relative;">
                    <svg viewBox="0 0 200 100" style="width:100%; height:100%">
                        <path d="M0,80 Q50,20 100,50 T200,10" fill="none" stroke="#2ecc71" stroke-width="3" />
                        <path d="M0,90 Q50,60 100,80 T200,40" fill="none" stroke="#e74c3c" stroke-width="3" />
                    </svg>
                </div>
            </div>
        </section>

        <section class="card calendar-container">
            <div class="calendar-header">
                <h2>Marzo 2026</h2>
                <div>
                    <button><i class="fas fa-chevron-left"></i></button>
                    <button><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
            <div class="calendar-grid">
                <div class="day">1</div><div class="day">2</div><div class="day">3</div><div class="day">4</div>
                <div class="day">5 <div class="event event-red">Affitto</div></div>
                <div class="day">6</div><div class="day">7</div>
                <div class="day">8</div><div class="day">9</div><div class="day">10</div>
                <div class="day">11 <div class="event event-blue">Bolletta Luce</div></div>
                <div class="day">12</div><div class="day">13</div>
                <div class="day">14 <div class="event event-green">Stipendio</div></div>
                </div>
        </section>

    </main>

</body>
</html>
