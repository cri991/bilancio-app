<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilancio App - Guadagni e Spese</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f0f4f7;
            --sidebar-color: #ffffff;
            --primary-blue: #3498db;
            --income-green: #2ecc71;
            --expense-red: #e74c3c;
            --text-dark: #2c3e50;
            --header-bg: #e1f0fa;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0; display: flex; height: 100vh;
            background-color: var(--bg-color); color: var(--text-dark);
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 80px; background: var(--sidebar-color);
            display: flex; flex-direction: column; align-items: center;
            padding: 20px 0; box-shadow: 2px 0 10px rgba(0,0,0,0.05);
        }
        .nav-link { color: #bdc3c7; font-size: 24px; margin: 20px 0; text-decoration: none; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { color: var(--primary-blue); }

        /* --- MAIN CONTENT --- */
        .main-content {
            flex-grow: 1; padding: 30px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 20px;
        }

        .header-nav {
            display: flex; justify-content: space-between; align-items: center;
            background: white; padding: 15px 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        .month-selector { display: flex; align-items: center; gap: 20px; font-weight: bold; font-size: 1.2rem; }
        .btn-nav { background: var(--primary-blue); border: none; color: white; padding: 8px 15px; border-radius: 8px; cursor: pointer; }

        /* --- TABELLE --- */
        .section-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .section-title { 
            border-bottom: 2px solid var(--bg-color); padding-bottom: 10px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
        }

        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        th { text-align: left; padding: 12px; background: var(--bg-color); color: #7f8c8d; font-size: 13px; text-transform: uppercase; }
        td { padding: 10px; border-bottom: 1px solid #f0f0f0; }

        input {
            width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px;
            font-family: inherit; box-sizing: border-box;
        }

        .price-input { font-weight: bold; color: var(--text-dark); }

        .total-row { font-size: 1.1rem; font-weight: bold; text-align: right; padding: 15px; border-radius: 8px; }
        .total-income { background: rgba(46, 204, 113, 0.1); color: var(--income-green); }
        .total-expense { background: rgba(231, 76, 60, 0.1); color: var(--expense-red); }

        .btn-add {
            background: none; border: 2px dashed #ddd; color: #95a5a6; width: 100%;
            padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.3s;
        }
        .btn-add:hover { border-color: var(--primary-blue); color: var(--primary-blue); }

        /* --- FOOTER GENERALE --- */
        .footer-summary {
            background: var(--text-dark); color: white; padding: 25px;
            border-radius: 15px; display: flex; justify-content: space-between; align-items: center;
        }
        .grand-total { font-size: 1.8rem; font-weight: bold; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <a href="index.html" class="nav-link"><i class="fas fa-home"></i></a>
        <a href="calendario.html" class="nav-link"><i class="fas fa-calendar-alt"></i></a>
        <a href="resoconto.html" class="nav-link"><i class="fas fa-chart-line"></i></a>
        <a href="#" class="nav-link active"><i class="fas fa-wallet"></i></a>
    </nav>

    <div class="main-content">
        <div class="header-nav">
            <h1>Gestione Entrate & Uscite</h1>
            <div class="month-selector">
                <button class="btn-nav" onclick="changeMonth(-1)"><i class="fas fa-chevron-left"></i></button>
                <span id="currentDateDisplay">MARZO 2026</span>
                <button class="btn-nav" onclick="changeMonth(1)"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>

        <div class="section-card">
            <div class="section-title">
                <h2><i class="fas fa-arrow-up" style="color:var(--income-green)"></i> PARAGRAFO 1: Dettaglio Guadagni</h2>
            </div>
            <table id="incomeTable">
                <thead>
                    <tr>
                        <th style="width: 60%;">Voce Guadagno</th>
                        <th>Prezzo (€)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><input type="text" placeholder="Es. Stipendio" value="Vendita Prodotto 1"></td>
                        <td><input type="number" class="price-input" value="3000" oninput="calculate()"></td>
                    </tr>
                </tbody>
            </table>
            <button class="btn-add" onclick="addRow('incomeTable')">+ Aggiungi Voce Guadagno</button>
            <div class="total-row total-income">TOTALE GUADAGNI: € <span id="sumIncome">3000.00</span></div>
        </div>

        <div class="section-card">
            <div class="section-title">
                <h2><i class="fas fa-arrow-down" style="color:var(--expense-red)"></i> PARAGRAFO 2: Dettaglio Spese</h2>
            </div>
            <table id="expenseTable">
                <thead>
                    <tr>
                        <th style="width: 60%;">Voce Spesa</th>
                        <th>Prezzo (€)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><input type="text" placeholder="Es. Affitto" value="Affitto Ufficio"></td>
                        <td><input type="number" class="price-input" value="1800" oninput="calculate()"></td>
                    </tr>
                </tbody>
            </table>
            <button class="btn-add" onclick="addRow('expenseTable')">+ Aggiungi Voce Spesa</button>
            <div class="total-row total-expense">TOTALE SPESE: € <span id="sumExpense">1800.00</span></div>
        </div>

        <div class="footer-summary">
            <div>
                <span style="opacity: 0.8; text-transform: uppercase; font-size: 12px;">Bilancio Netto del Mese</span>
                <div class="grand-total" id="grandTotal">€ 1.200,00</div>
            </div>
            <i class="fas fa-vault fa-3x" style="opacity: 0.2;"></i>
        </div>
    </div>

    <script>
        let monthIdx = 2; // Marzo
        const mesi = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];

        function changeMonth(delta) {
            monthIdx += delta;
            if(monthIdx > 11) monthIdx = 0;
            if(monthIdx < 0) monthIdx = 11;
            document.getElementById('currentDateDisplay').innerText = `${mesi[monthIdx].toUpperCase()} 2026`;
            
            // Qui potresti pulire i campi per simulare il cambio mese
            // resetFields(); 
        }

        function addRow(tableId) {
            const table = document.getElementById(tableId).getElementsByTagName('tbody')[0];
            const newRow = table.insertRow();
            newRow.innerHTML = `
                <td><input type="text" placeholder="Nuova voce..."></td>
                <td><input type="number" class="price-input" value="0" oninput="calculate()"></td>
            `;
        }

        function calculate() {
            let totalIncome = 0;
            let totalExpense = 0;

            document.querySelectorAll('#incomeTable .price-input').forEach(input => {
                totalIncome += parseFloat(input.value) || 0;
            });

            document.querySelectorAll('#expenseTable .price-input').forEach(input => {
                totalExpense += parseFloat(input.value) || 0;
            });

            document.getElementById('sumIncome').innerText = totalIncome.toFixed(2);
            document.getElementById('sumExpense').innerText = totalExpense.toFixed(2);
            
            const grandTotal = totalIncome - totalExpense;
            const grandTotalEl = document.getElementById('grandTotal');
            grandTotalEl.innerText = `€ ${grandTotal.toLocaleString('it-IT', {minimumFractionDigits: 2})}`;
            
            grandTotalEl.style.color = grandTotal >= 0 ? '#2ecc71' : '#e74c3c';
        }

        // Calcolo iniziale al caricamento
        calculate();
    </script>
</body>
</html>
